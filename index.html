        function createBranch(parent, length, width, depth) {
            // 末端の枝分けを1段削る（最後の分岐レベルなし）
            const maxDepth = 6;
            if (depth > maxDepth) return;

            // 枝の作成
            const branchGeo = new THREE.CylinderGeometry(width * 0.65, width, length, 4);
            // 原点を枝の底面にするためにジオメトリを移動
            branchGeo.translate(0, length / 2, 0);
            const branchMesh = new THREE.Mesh(branchGeo, trunkMaterial);
            parent.add(branchMesh);

            // 枝の先端（花を咲かせる、または次の枝を伸ばす位置）
            const tipPosition = new THREE.Vector3(0, length, 0);

            // 先端付近に花を咲かせる（表示数はスライダーで制御）
            if (depth >= maxDepth - 2) {
                const flowersCount = depth === maxDepth ? 4 : (depth === maxDepth - 1 ? 2 : 1);
                for (let i = 0; i < flowersCount; i++) {
                    const flowerGroup = new THREE.Group();
                    for (let j = 0; j < 5; j++) {
                        const petal = new THREE.Mesh(petalGeometry, petalMaterial);
                        petal.rotation.z = (Math.PI * 2 / 5) * j;
                        petal.rotation.x = 0.2;
                        flowerGroup.add(petal);
                    }

                    flowerGroup.position.copy(tipPosition);
                    flowerGroup.position.x += (treeRng() - 0.5) * 2.0;
                    flowerGroup.position.y += (treeRng() - 0.5) * 2.0;
                    flowerGroup.position.z += (treeRng() - 0.5) * 2.0;
                    flowerGroup.rotation.set(
                        treeRng() * Math.PI,
                        treeRng() * Math.PI,
                        treeRng() * Math.PI
                    );

                    const scale = 0.5 + treeRng() * 0.5;
                    flowerGroup.scale.set(scale, scale, scale);
                    flowerGroup.userData.baseScale = scale;
                    flowerGroup.visible = false;

                    branchMesh.add(flowerGroup);
                    flowerMeshes.push(flowerGroup);
                }
            }

            // 次の枝を生やす
            if (depth < maxDepth) {
                // 枝の分岐数を制御（先に行くほど2本になりやすくし、処理落ちを防ぐ）
                const numBranches = (depth === 0) ? 3 : (depth > 4 ? 2 : (treeRng() > 0.3 ? 2 : 3));

                for (let i = 0; i < numBranches; i++) {
                    const nextBranchGroup = new THREE.Group();
                    nextBranchGroup.position.copy(tipPosition);

                    // 枝の広がり角度（上の方ほど横に広がりやすくする）
                    const angleX = (treeRng() - 0.5) * (1.0 + depth * 0.15);
                    const angleZ = (treeRng() - 0.5) * (1.0 + depth * 0.15);
                    nextBranchGroup.rotation.set(angleX, 0, angleZ);

                    // 木全体が横にふんわり広がるようにY軸も回転
                    nextBranchGroup.rotation.y = treeRng() * Math.PI * 2;

                    branchMesh.add(nextBranchGroup);

                    // 再帰呼び出し（長さと太さを少しずつ小さくする）
                    createBranch(nextBranchGroup, length * (0.75 + treeRng() * 0.1), width * 0.65, depth + 1);
                }
            }
        }

        // 【New】木の生成開始（初期の長さを5.5、太さを1.4にして立派な大木に）
        createBranch(treeRoot, 5.5, 1.4, 0);
        // 木全体のY座標を下げて、画面中央に収まりやすくする
        treeRoot.position.y = -10;

        // カメラを引いて、大きな木全体を捉える
        camera.position.set(0, 10, 32);
        camera.lookAt(0, 6, 0);

        // 幹（分岐メッシュ）は固定なので行列更新を止めてコストを削減（花は可変なので対象外）
        treeRoot.traverse((obj) => {
            if (!obj || !obj.isMesh) return;
            if (obj.material !== trunkMaterial) return;
            obj.matrixAutoUpdate = false;
            obj.updateMatrix();
        });
        treeRoot.updateMatrixWorld(true);

        // --- 5. 舞い散る花びら（InstancedMesh） ---
        const ENABLE_FALLING_PETALS = ENABLE_STAGE_AMBIENCE && ENABLE_STAGE_PETALS;
        const particlesMax = PETAL_PARTICLES_MAX;
        // CPUで毎フレーム全インスタンスの行列を書き換えると、枚数増加で一気に重くなる。
        // ここでは「初期配置だけCPU」「落下/揺れはGPU(シェーダ)で時間から計算」にして、
        // スライダーで枚数を増やしてもCPU負荷が増えにくい構造にする。
        const fallingPetals = new THREE.InstancedMesh(petalGeometry, petalMaterial.clone(), particlesMax);
        // 追加パラメータ（インスタンス属性）
        const aSpeedY = new Float32Array(particlesMax);
        const aPhaseX = new Float32Array(particlesMax);
        const aPhaseZ = new Float32Array(particlesMax);
        const aAmp = new Float32Array(particlesMax);
        const aStartY = new Float32Array(particlesMax);
        const aRange = new Float32Array(particlesMax);
        const aDrift = new Float32Array(particlesMax);

        // 時間ユニフォーム（GPUで落下量を算出）
        const petalUniforms = { uTime: { value: 0 } };
        const dummy = new THREE.Object3D();
        for (let i = 0; i < particlesMax; i++) {
            const x = (petalRng() - 0.5) * 40;
            const y = petalRng() * 30 - 5;
            const z = (petalRng() - 0.5) * 40;

            dummy.position.set(x, y, z);
            dummy.rotation.set(petalRng() * Math.PI, petalRng() * Math.PI, petalRng() * Math.PI);
            const scale = 0.4 + petalRng() * 0.4;
            dummy.scale.set(scale, scale, scale);
            dummy.updateMatrix();
            fallingPetals.setMatrixAt(i, dummy.matrix);

            // 各インスタンスの落下・揺れパラメータ
            aSpeedY[i] = petalRng() * 0.55 + 0.35;        // 落下スピード（単位/秒、シェーダ側で使用）
            aPhaseX[i] = petalRng() * Math.PI * 2;        // 揺れ位相
            aPhaseZ[i] = petalRng() * Math.PI * 2;
            aAmp[i] = petalRng() * 0.12 + 0.04;           // 揺れ振幅
            aStartY[i] = y;                                  // 初期Y
            aRange[i] = petalRng() * 34 + 18;             // ループ範囲
            aDrift[i] = (petalRng() - 0.5) * 0.35;        // 横流れ
        }
        // InstancedBufferAttributes を追加
        fallingPetals.geometry.setAttribute('aSpeedY', new THREE.InstancedBufferAttribute(aSpeedY, 1));
        fallingPetals.geometry.setAttribute('aPhaseX', new THREE.InstancedBufferAttribute(aPhaseX, 1));
        fallingPetals.geometry.setAttribute('aPhaseZ', new THREE.InstancedBufferAttribute(aPhaseZ, 1));
        fallingPetals.geometry.setAttribute('aAmp', new THREE.InstancedBufferAttribute(aAmp, 1));
        fallingPetals.geometry.setAttribute('aStartY', new THREE.InstancedBufferAttribute(aStartY, 1));
        fallingPetals.geometry.setAttribute('aRange', new THREE.InstancedBufferAttribute(aRange, 1));
        fallingPetals.geometry.setAttribute('aDrift', new THREE.InstancedBufferAttribute(aDrift, 1));

        // マテリアルの頂点シェーダを拡張（時間でオフセット）
        // 透明/両面などの既存設定を保ちつつ、インスタンス単位で位置を動かす。
        fallingPetals.material.onBeforeCompile = (shader) => {
            shader.uniforms.uTime = petalUniforms.uTime;
            shader.vertexShader =
                `
                uniform float uTime;
                attribute float aSpeedY;
                attribute float aPhaseX;
                attribute float aPhaseZ;
                attribute float aAmp;
                attribute float aStartY;
                attribute float aRange;
                attribute float aDrift;
                ` + shader.vertexShader;

            shader.vertexShader = shader.vertexShader.replace(
                '#include <begin_vertex>',
                `
                #include <begin_vertex>
                // インスタンス基準位置（instanceMatrixの平行移動成分）
                vec3 iPos = vec3(instanceMatrix[3][0], instanceMatrix[3][1], instanceMatrix[3][2]);
                // 落下: startY から range を周期的にループ
                float fall = mod(uTime * aSpeedY + aPhaseX, aRange);
                float yNow = aStartY - fall;
                // 揺れ: sin/cos（GPU側で一括処理）
                float swayX = sin(uTime * 1.7 + aPhaseX) * aAmp;
                float swayZ = cos(uTime * 1.3 + aPhaseZ) * aAmp;
                // 横流れ: 落下量に比例したドリフト
                float drift = (fall / max(aRange, 0.001)) * aDrift;
                transformed.x += swayX + drift;
                transformed.z += swayZ;
                // instanceMatrix のY(=iPos.y) + (yNow - aStartY) を適用
                transformed.y += (yNow - aStartY);
                `
            );
        };
        // Three がコンパイルしたシェーダを使い回せるように
        fallingPetals.material.needsUpdate = true;

        fallingPetals.count = 0;
        fallingPetals.visible = ENABLE_FALLING_PETALS;
        dynamicScene.add(fallingPetals);

        function setWeatherStyleVar(name, value) {
            document.body.style.setProperty(name, value);
        }

        function applyWeatherBackdrop(percent01) {
            const p = clamp01(percent01);
            const weather = sampleWeatherBackdrop(p);
            const rain = ENABLE_STAGE_AMBIENCE && ENABLE_STAGE_WEATHER && ENABLE_STAGE_RAIN
                ? weather.rain
                : 0;
            const sun = ENABLE_STAGE_AMBIENCE && ENABLE_STAGE_WEATHER && ENABLE_STAGE_SUN
                ? Math.pow(p, 1.45)
                : 0;
            const sunshineProgress = Math.max(0, (p - 0.42) / 0.58);
            const sunbeams = ENABLE_STAGE_AMBIENCE && ENABLE_STAGE_WEATHER && ENABLE_STAGE_SUN
                ? Math.pow(sunshineProgress, 1.15)
                : 0;
            const cloudOpacity = ENABLE_STAGE_AMBIENCE && ENABLE_STAGE_WEATHER
                ? weather.cloudOpacity
                : 0;
            const brightness = ENABLE_STAGE_AMBIENCE && ENABLE_STAGE_WEATHER
                ? weather.brightness
                : 1;
            const saturate = ENABLE_STAGE_AMBIENCE && ENABLE_STAGE_WEATHER
                ? weather.saturate
                : 1;
            weatherRainIntensity = rain;

            setWeatherStyleVar('--weather-sky-top', weather.top);
            setWeatherStyleVar('--weather-sky-mid', weather.mid);
            setWeatherStyleVar('--weather-sky-bottom', weather.bottom);
            setWeatherStyleVar('--weather-sky-haze', weather.haze);
            setWeatherStyleVar('--weather-sky-glow', weather.glow);
            setWeatherStyleVar('--weather-rain-opacity', rain.toFixed(3));
            setWeatherStyleVar('--weather-cloud-opacity', cloudOpacity.toFixed(3));
            setWeatherStyleVar('--weather-sun-opacity', (sun * 0.86).toFixed(3));
            setWeatherStyleVar('--weather-sunbeams-opacity', (sunbeams * 0.58).toFixed(3));
            setWeatherStyleVar('--weather-backdrop-brightness', brightness.toFixed(3));
            setWeatherStyleVar('--weather-backdrop-saturate', saturate.toFixed(3));
        }

        function applyBlossomAmbience(percent01) {
            const p = clamp01(percent01);
            const stage = ENABLE_STAGE_AMBIENCE ? resolveAmbienceStage(p) : 0;

            document.body.dataset.ambienceStage = String(stage);
            applyWeatherBackdrop(p);

            if (ENABLE_STAGE_AMBIENCE && ENABLE_STAGE_LIGHTING) {
                const ambience = sampleAmbiencePreset(p);
                ambientLight.color.copy(ambience.ambientColor);
                ambientLight.intensity = ambience.ambientIntensity;
                sunLight.color.copy(ambience.sunColor);
                sunLight.intensity = ambience.sunIntensity;
                staticScene.fog.color.copy(ambience.fogColor);
                staticScene.fog.density = ambience.fogDensity;

                // キャッシュ側の木の見え方が変わるので再生成
                invalidateStaticCache();
            }

            if (ENABLE_STAGE_AMBIENCE && ENABLE_FALLING_PETALS) {
                const ambience = sampleAmbiencePreset(p);
                const visible = ambience.petalCount > 0;
                fallingPetals.visible = visible;
                fallingPetals.count = visible
                    ? Math.min(particlesMax, PETAL_COUNT_CAP, ambience.petalCount)
                    : 0;
            } else if (ENABLE_FALLING_PETALS) {
                fallingPetals.visible = false;
                fallingPetals.count = 0;
            }
        }

        // --- 6. 木の装飾花（累計post+commentで段階表示。200で満開） ---
        function applyTreeFlowerByBlossomPercent(percent01) {
            const p = clamp01(percent01);
            const isFull = p >= 1;
            const effectiveFlowerDensity = isFull ? 1 : FLOWER_DENSITY * p;
            const treeFlowerSizeMul =
                1 + (1 / Math.sqrt(Math.max(0.12, effectiveFlowerDensity)) - 1) * 0.55;
            const visibleDecor = isFull
                ? flowerMeshes.length
                : Math.round(flowerMeshes.length * FLOWER_DENSITY * p);

            for (let i = 0; i < flowerMeshes.length; i++) {
                const fg = flowerMeshes[i];
                const isVisible = i < visibleDecor;
                fg.visible = isVisible;
                const baseScale = Number(fg.userData?.baseScale) || 1;
                const s = baseScale * (isVisible ? treeFlowerSizeMul : 1);
                fg.scale.set(s, s, s);
            }

            // 花（木の見え方）が変わるので静的キャッシュを更新
            invalidateStaticCache();
        }

        function setBlossomTotalCount(nextCount) {
            const n = Math.max(0, Math.trunc(Number(nextCount) || 0));
            blossomTotalCount = n;
            const percent = blossomPercentFromTotalCount(blossomTotalCount);
            applyTreeFlowerByBlossomPercent(percent);
            applyBlossomAmbience(percent);
        }

        // 初期は投稿0相当（装飾桜なし）から開始
        setBlossomTotalCount(0);

        // --- 6b. 軌道コンテンツ（ミニトーストが XZ 上の真円を周回。投稿は PointLight でいいね発光）
        // 検証トグル（すぐ戻せる）
        // - "dom": 既存（CSS2DRenderer + DOMカード）
        // - "webgl": 本物の3D（CanvasTexture を貼ったプレーン）
        const ORBIT_RENDER_MODE = 'webgl';
        // すぐ戻せる: カード高さを内容に応じて動的化（空欄を減らす）
        const ORBIT_CARD_DYNAMIC_HEIGHT = true;
        const ORBIT_CARD_IMG_MAX_HEIGHT_PX = 360;
        const ORBIT_CARD_MIN_HEIGHT_PX = 360;
        const ORBIT_CARD_MAX_HEIGHT_PX = 720;
        // すぐ戻せる: 「木の裏側で暗くなる」強さ（0に近いほど明るい）
        const ORBIT_BEHIND_DIM_STRENGTH = 0.55;
        // すぐ戻せる: カード向きを「木→カメラの共通yaw」に揃える
        const ORBIT_USE_TREE_CAMERA_YAW = true;
        const ORBIT_USE_GOLDEN_SPREAD = true; // true=黄金角スパイラル, false=従来リング
        const ORBIT_ENABLE_LOD = true; // true=遠距離カードの更新を間引く
        const ORBIT_FAR_UPDATE_EVERY_N_FRAMES = 3;
        const ORBIT_FAR_DISTANCE = 34; // カメラから遠いカードは間引き対象
        const ORBIT_FAR_DISTANCE_SQ = ORBIT_FAR_DISTANCE * ORBIT_FAR_DISTANCE;
        const ORBIT_ENABLE_POST_POINT_LIGHTS = false;
        // 画面内での「ばらし」調整（すぐ戻せる）
        // - 横: 画面中心から左右に 1.5倍 くらい広げる
        // - 縦: 画面下端（底）を基準に上方向へ 2.5倍 くらい伸ばす
        const ORBIT_SPREAD_XZ_SCALE = 1.5;
        const ORBIT_SPREAD_Y_SCALE = 5;

        const ORBIT_ITEMS_PER_RING = 6;
        const ORBIT_BASE_RADIUS = 10;
        const ORBIT_RING_RADIUS_STEP = 0.55;
        const ORBIT_RING_HEIGHT_TOP = 4.25;
        const ORBIT_RING_GAP = 0.34;
        const ORBIT_CARD_BASE_SCALE = 0.27;
        const ORBIT_MAX = STATIC_ORBIT_MAX ?? 100; // 表示上限
        const orbitRoot = new THREE.Group();
        // 軌道全体が下に沈みすぎると「下に固まって見える」ので、少し持ち上げる（すぐ戻せる）
        const ORBIT_ROOT_Y = -2.4;
        orbitRoot.position.set(0, ORBIT_ROOT_Y, 0);
        dynamicScene.add(orbitRoot);

        const labelRenderer = ORBIT_RENDER_MODE === 'dom'
            ? new CSS2DRenderer()
            : null;
        if (labelRenderer) {
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'fixed';
            labelRenderer.domElement.style.top = '0';
            labelRenderer.domElement.style.left = '0';
            labelRenderer.domElement.style.pointerEvents = 'none';
            labelRenderer.domElement.style.zIndex = '5';
            document.body.appendChild(labelRenderer.domElement);
        }

        const orbitEntries = [];
        const orbitCardGeometryCache = new Map();
        /** 追加のたびに増やすだけ（削除で戻さない）。黄金角レイアウトを n 件数で再正規化しないため */
        let _orbitSlotSerial = 0;
        const seenFeedIds = new Set();
        /** @type {Map<number, { pointLight: THREE.PointLight }>} */
        const postGlowById = new Map();
        const orbitTarget = new THREE.Vector3();
        const _treeWorldPos = new THREE.Vector3();
        const _treeToCam = new THREE.Vector3();
        const orbitRaycaster = new THREE.Raycaster();
        const orbitPointerNdc = new THREE.Vector2();
        const orbitCardMaxAnisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy?.() || 1);

        function likesToEmissiveIntensity(likes) {
            const L = Math.max(0, Number(likes) || 0);
            const t = L / (L + 10);
            return 0.06 + t * 1.28;
        }

        function roundedRect(ctx, x, y, w, h, r) {
            const rr = Math.max(0, Math.min(r, Math.min(w, h) / 2));
            ctx.beginPath();
            ctx.moveTo(x + rr, y);
            ctx.arcTo(x + w, y, x + w, y + h, rr);
            ctx.arcTo(x + w, y + h, x, y + h, rr);
            ctx.arcTo(x, y + h, x, y, rr);
            ctx.arcTo(x, y, x + w, y, rr);
            ctx.closePath();
        }

        function wrapTextLines(ctx, text, maxWidth) {
            const words = String(text ?? '').split(/\s+/).filter(Boolean);
            if (words.length === 0) return [''];
            const lines = [];
            let line = '';
            for (const w of words) {
                const next = line ? `${line} ${w}` : w;
                if (ctx.measureText(next).width <= maxWidth) {
                    line = next;
                    continue;
                }
                if (line) lines.push(line);
                // 1単語が長すぎる場合は強制分割
                if (ctx.measureText(w).width <= maxWidth) {
                    line = w;
                } else {
                    let chunk = '';
                    for (const ch of w) {
                        const c2 = chunk + ch;
                        if (ctx.measureText(c2).width <= maxWidth) {
                            chunk = c2;
                        } else {
                            if (chunk) lines.push(chunk);
                            chunk = ch;
                        }
                    }
                    line = chunk;
                }
            }
            if (line) lines.push(line);
            return lines;
        }

        /**
         * 本文エリア幅 contentW に収め、アスペクト維持。高さは maxH でクランプ（横はその分縮小）。
         * @param {{ w?: number, h?: number }} imgNatural
         */
        function orbitCardImageDisplayDims(imgNatural, contentW, maxH) {
            const nw = imgNatural?.w;
            const nh = imgNatural?.h;
            if (!nw || !nh || nw <= 0 || nh <= 0) {
                const drawH = Math.min(contentW * (9 / 16), maxH);
                return { drawW: contentW, drawH };
            }
            let drawW = contentW;
            let drawH = (drawW / nw) * nh;
            if (drawH > maxH) {
                drawH = maxH;
                drawW = (nw / nh) * drawH;
            }
            return { drawW, drawH };
        }

        /**
         * @param {object} item
         * @param {{ w: number, h: number } | null} imgNatural ロード後の実寸（省略時は 16:9 想定で見積もり）
         */
        function computeOrbitCardLayout(item, imgNatural = null) {
            const isComment = item.kind === 'comment';
            const showImg = item.kind === 'post' && typeof item.img === 'string' && item.img.trim().length > 0;
            // ベース（幅は固定）
            const W = 1024;
            const padTop = 112;
            const padBottom = 44;
            const padX = 42;
            const contentW = W - padX * 2;

            // 文字数からざっくり行数を見積もる（最終描画とズレても「空欄削減」が目的なのでOK）
            const { title, subtitle } = buildToastContent({
                who: item.who,
                content: item.content,
                kind: item.kind,
                from: item.from,
            });

            // フォントサイズは draw 側と揃える
            const titleFontPx = isComment ? 44 : 48;
            const msgFontPx = 34;
            const approxCharWTitle = titleFontPx * 0.55;
            const approxCharWMsg = msgFontPx * 0.55;

            const titleMaxWidth = W - padX * 2 - 20;
            const msgMaxWidth = W - padX * 2;
            const titleCharsPerLine = Math.max(8, Math.floor(titleMaxWidth / approxCharWTitle));
            const msgCharsPerLine = Math.max(10, Math.floor(msgMaxWidth / approxCharWMsg));

            const titleLen = String(title ?? '').length;
            const msgLen = String(subtitle ?? '').length;
            const titleLines = Math.min(2, Math.max(1, Math.ceil(titleLen / titleCharsPerLine)));
            const msgLines = Math.min(3, Math.max(1, Math.ceil(msgLen / msgCharsPerLine)));

            let height = padTop;
            height += titleLines * 52;
            height += 10;
            height += msgLines * 44;
            if (showImg) {
                const dims = orbitCardImageDisplayDims(imgNatural, contentW, ORBIT_CARD_IMG_MAX_HEIGHT_PX);
                height += 12 + dims.drawH + 12;
            }
            height += 10; // gap before footer rule
            height += 2; // line
            height += 34; // footer text baseline
            height += padBottom;

            const H = Math.max(
                ORBIT_CARD_MIN_HEIGHT_PX,
                Math.min(ORBIT_CARD_MAX_HEIGHT_PX, Math.round(height / 8) * 8),
            );

            // 3Dプレーン高さ: 幅1024→7.2 に合わせてスケール
            const planeW = 7.2;
            const planeH = planeW * (H / W);

            return { W, H, planeW, planeH, padTop, padBottom, padX };
        }

        /**
         * @param {HTMLImageElement | null} loadedImg 任意（あればタイトル・本文の下にフル幅基準で描画）
         */
        function drawOrbitCardToCanvas(canvas, item, accent, isComment, loadedImg = null) {
            const ctx = canvas.getContext('2d');
            if (!ctx) return;
            const W = canvas.width;
            const H = canvas.height;
            ctx.clearRect(0, 0, W, H);

            // 背景（DOM版に寄せた淡いピンクのグラデ）
            const bg = ctx.createLinearGradient(0, 0, W, H);
            bg.addColorStop(0, '#fff9fc');
            bg.addColorStop(0.42, '#ffe9f2');
            bg.addColorStop(1, '#fff5f0');
            roundedRect(ctx, 16, 16, W - 32, H - 32, 38);
            ctx.fillStyle = bg;
            ctx.fill();

            // 枠線
            ctx.lineWidth = 3;
            ctx.strokeStyle = 'rgba(255, 170, 190, 0.55)';
            ctx.stroke();

            // ほんのりアクセント
            const glow = ctx.createRadialGradient(120, H - 70, 10, 120, H - 70, 160);
            glow.addColorStop(0, 'rgba(255, 183, 197, 0.35)');
            glow.addColorStop(1, 'rgba(255, 183, 197, 0)');
            ctx.fillStyle = glow;
            ctx.fillRect(0, 0, W, H);

            // タイトル/本文
            const { title, subtitle } = buildToastContent({
                who: item.who,
                content: item.content,
                kind: item.kind,
                from: item.from,
            });
            const footer = giftNoteText(item.kind, item.who);

            const padX = 42;
            const padTop = 112;
            const padBottom = 44;
            const contentW = W - padX * 2;
            const showImg =
                item.kind === 'post' &&
                typeof item.img === 'string' &&
                item.img.trim().length > 0;
            let y = padTop;

            ctx.fillStyle = '#6b2d3f';
            ctx.font = isComment ? '800 44px system-ui, -apple-system, sans-serif' : '800 48px system-ui, -apple-system, sans-serif';
            const titleLines = wrapTextLines(ctx, title, W - padX * 2 - 20);
            for (const line of titleLines.slice(0, 2)) {
                ctx.fillText(line, padX, y);
                y += 52;
            }

            y += 10;
            ctx.fillStyle = '#5c3d48';
            ctx.font = '600 34px system-ui, -apple-system, sans-serif';
            const msgLines = wrapTextLines(ctx, subtitle || '', W - padX * 2);
            for (const line of msgLines.slice(0, 3)) {
                ctx.fillText(line, padX, y);
                y += 44;
            }

            if (showImg) {
                y += 12;
                const nw = loadedImg ? loadedImg.naturalWidth || loadedImg.width : 0;
                const nh = loadedImg ? loadedImg.naturalHeight || loadedImg.height : 0;
                const dims = orbitCardImageDisplayDims(
                    nw && nh ? { w: nw, h: nh } : null,
                    contentW,
                    ORBIT_CARD_IMG_MAX_HEIGHT_PX,
                );
                const imgX = padX + (contentW - dims.drawW) / 2;
                roundedRect(ctx, imgX, y, dims.drawW, dims.drawH, 22);
                ctx.save();
                ctx.clip();
                ctx.fillStyle = 'rgba(255,255,255,0.35)';
                ctx.fillRect(imgX, y, dims.drawW, dims.drawH);
                if (loadedImg && nw > 0 && nh > 0) {
                    ctx.drawImage(loadedImg, imgX, y, dims.drawW, dims.drawH);
                }
                ctx.restore();
                ctx.strokeStyle = 'rgba(255, 170, 190, 0.45)';
                ctx.lineWidth = 2;
                roundedRect(ctx, imgX, y, dims.drawW, dims.drawH, 22);
                ctx.stroke();
                y += dims.drawH + 12;
            }

            y += 10;
            ctx.strokeStyle = 'rgba(255, 170, 190, 0.35)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(padX, y);
            ctx.lineTo(W - padX, y);
            ctx.stroke();

            ctx.fillStyle = 'rgba(90, 52, 62, 0.75)';
            ctx.font = '700 22px system-ui, -apple-system, sans-serif';
            ctx.fillText(footer, padX, y + 34);

            // 右上に桜
            ctx.fillStyle = 'rgba(255, 158, 196, 0.55)';
            ctx.font = '800 46px system-ui, -apple-system, sans-serif';
            ctx.fillText('🌸', W - 86, 74);

            // アクセント（外枠にほんのり）
            ctx.strokeStyle = accent;
            ctx.globalAlpha = 0.12;
            ctx.lineWidth = 10;
            roundedRect(ctx, 20, 20, W - 40, H - 40, 36);
            ctx.stroke();
            ctx.globalAlpha = 1;
        }

        function orbitCardGeometryKey(layout) {
            return `${layout.planeW.toFixed(4)}:${layout.planeH.toFixed(4)}`;
        }

        function retainOrbitCardGeometry(layout) {
            const key = orbitCardGeometryKey(layout);
            let record = orbitCardGeometryCache.get(key);
            if (!record) {
                record = {
                    geometry: new THREE.PlaneGeometry(layout.planeW, layout.planeH, 1, 1),
                    refs: 0,
                };
                orbitCardGeometryCache.set(key, record);
            }
            record.refs += 1;
            return { key, geometry: record.geometry };
        }

        function releaseOrbitCardGeometry(key) {
            if (!key) return;
            const record = orbitCardGeometryCache.get(key);
            if (!record) return;
            record.refs -= 1;
            if (record.refs > 0) return;
            record.geometry.dispose();
            orbitCardGeometryCache.delete(key);
        }

        function createOrbitCardWebGL(item) {
            const group = new THREE.Group();
            const isComment = item.kind === 'comment';
            const accent = 'rgba(255, 158, 196, 0.45)';
            const canvas = document.createElement('canvas');
            const showImg = item.kind === 'post' && typeof item.img === 'string' && item.img.trim().length > 0;
            const layout = ORBIT_CARD_DYNAMIC_HEIGHT ? computeOrbitCardLayout(item) : { W: 1024, H: 448, planeW: 7.2, planeH: 3.15 };
            canvas.width = layout.W;
            canvas.height = layout.H;

            drawOrbitCardToCanvas(canvas, item, accent, isComment, null);

            const tex = new THREE.CanvasTexture(canvas);
            tex.colorSpace = THREE.SRGBColorSpace;
            tex.anisotropy = orbitCardMaxAnisotropy;
            tex.needsUpdate = true;

            const mat = new THREE.MeshBasicMaterial({
                map: tex,
                transparent: true,
                opacity: 1,
                depthWrite: false,
            });
            const { key: geometryKey, geometry: geom } = retainOrbitCardGeometry(layout);
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.set(0, 0.38, 0);
            group.add(mesh);

            const webgl = {
                group,
                mesh,
                texture: tex,
                material: mat,
                geometry: geom,
                geometryKey,
                layout,
            };

            if (showImg) {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                    const nw = img.naturalWidth || img.width;
                    const nh = img.naturalHeight || img.height;
                    const newLayout = computeOrbitCardLayout(item, { w: nw, h: nh });
                    const sizeChanged = newLayout.H !== webgl.layout.H || newLayout.W !== webgl.layout.W;
                    webgl.layout = newLayout;
                    canvas.width = newLayout.W;
                    canvas.height = newLayout.H;
                    drawOrbitCardToCanvas(canvas, item, accent, isComment, img);
                    tex.needsUpdate = true;
                    if (sizeChanged) {
                        releaseOrbitCardGeometry(webgl.geometryKey);
                        const nextGeometryRecord = retainOrbitCardGeometry(newLayout);
                        webgl.geometryKey = nextGeometryRecord.key;
                        webgl.geometry = nextGeometryRecord.geometry;
                        webgl.mesh.geometry = webgl.geometry;
                    }
                };
                img.onerror = () => { };
                img.src = item.img.trim();
            }

            return webgl;
        }

        /** 軌道上の見た目はカードのみ。PointLight は必要時だけ有効化する。 */
        function createOrbitAnchor(kind, likes) {
            const group = new THREE.Group();
            const isPost = kind === 'post';
            const pointLight = ORBIT_ENABLE_POST_POINT_LIGHTS
                ? new THREE.PointLight(0xff9ec4, isPost ? likesToEmissiveIntensity(likes) * 2.2 : 0, 12)
                : null;
            if (pointLight) {
                pointLight.position.set(0, 0, 0);
                group.add(pointLight);
            }
            return { group, pointLight, isPost };
        }

        function applyPostGlow(postId, likes) {
            const rec = postGlowById.get(postId);
            if (!rec?.pointLight) return;
            const li = likesToEmissiveIntensity(likes);
            rec.pointLight.intensity = li * 2.2;
        }

        /**
         * @param {object} item
         * @returns {CSS2DObject}
         */
        function createOrbitMiniToast(item) {
            const payload = orbitItemToPayload(item);
            const { title, subtitle, who } = buildToastContent(payload);
            const footer = giftNoteText(item.kind, who);

            // CSS2DRenderer が element.style.transform を毎フレーム上書きするため、
            // スケールは「内側要素」に適用する（外側は renderer の位置合わせ用）。
            const outer = document.createElement('div');
            const inner = document.createElement('div');
            inner.className = 'orbit-toast-scale is-interactive';

            const card = document.createElement('div');
            card.className = 'orbit-toast-card is-clickable';
            if (item.kind === 'comment') card.classList.add('orbit-toast-card--comment');
            const itemId = Number(item.id);
            card.setAttribute('role', 'button');
            card.tabIndex = 0;
            card.setAttribute('aria-label', 'カードを前面表示');
            card.addEventListener('click', (event) => {
                event.stopPropagation();
                showPickedOrbitCard(payload);
            });
            card.addEventListener('keydown', (event) => {
                if (event.key !== 'Enter' && event.key !== ' ') return;
                event.preventDefault();
                showPickedOrbitCard(payload);
            });

            const whoEl = document.createElement('div');
            whoEl.className = 'orbit-toast-card__who';
            whoEl.textContent = title;

            const msgEl = document.createElement('div');
            msgEl.className = 'orbit-toast-card__msg';
            msgEl.textContent = subtitle;

            card.appendChild(whoEl);
            card.appendChild(msgEl);

            const showImg =
                item.kind === 'post' &&
                typeof item.img === 'string' &&
                item.img.trim().length > 0;
            if (showImg) {
                const wrap = document.createElement('div');
                wrap.className = 'orbit-toast-card__img-wrap is-visible';
                const img = document.createElement('img');
                img.className = 'orbit-toast-card__img';
                img.alt = '';
                img.src = item.img.trim();
                img.onerror = () => {
                    wrap.classList.remove('is-visible');
                    img.removeAttribute('src');
                };
                wrap.appendChild(img);
                card.appendChild(wrap);
            }

            const giftEl = document.createElement('div');
            giftEl.className = 'orbit-toast-card__gift';
            giftEl.textContent = footer;
            card.appendChild(giftEl);

            inner.appendChild(card);
            outer.appendChild(inner);
            const label = new CSS2DObject(outer);
            label.position.set(0, 0.38, 0);
            return label;
        }

        /** 追加されたエントリにだけ軌道を割り当て（既存は触らない）。黄金角は orbitSlot で固定 */
        function assignOrbitParamsForEntry(entry) {
            const seed = hashString(String(entry.id));
            const index = orbitEntries.indexOf(entry);
            if (index < 0) return;

            if (ORBIT_USE_GOLDEN_SPREAD) {
                const slot = entry.orbitSlot ?? index;
                const goldenAngle = Math.PI * (3 - Math.sqrt(5)); // ~2.399963
                const t = Math.min(1, (slot + 1) / ORBIT_MAX);
                const radiusJitter = ((seed >> 3) % 24) / 100; // 0..0.23
                const radiusRaw = ORBIT_BASE_RADIUS - 1.2 + 4.2 * Math.sqrt(t) + radiusJitter;
                const radius = radiusRaw * ORBIT_SPREAD_XZ_SCALE;
                const baseAngle = slot * goldenAngle + ((seed % 37) / 37) * 0.22;
                const heightBottom = 1.15;
                const heightTopRaw = ORBIT_RING_HEIGHT_TOP + 0.35;
                const heightTop = heightBottom + (heightTopRaw - heightBottom) * ORBIT_SPREAD_Y_SCALE;
                const height = THREE.MathUtils.lerp(heightTop, heightBottom, t) + ((seed >> 1) % 9) * 0.05;
                entry.orbit = {
                    centerX: 0,
                    radius,
                    height,
                    speed: 0.055 + (seed % 11) * 0.0012,
                    baseAngle,
                    index: slot,
                };
            } else {
                const n = orbitEntries.length;
                const ringIndex = Math.floor(index / ORBIT_ITEMS_PER_RING);
                const ringStart = ringIndex * ORBIT_ITEMS_PER_RING;
                const itemsInRing = Math.min(ORBIT_ITEMS_PER_RING, Math.max(n - ringStart, 0));
                const slotIndex = index - ringStart;
                const slotAngle = itemsInRing > 0 ? (slotIndex / itemsInRing) * Math.PI * 2 : 0;
                const ringOffset = ringIndex % 2 === 0 ? 0 : Math.PI / Math.max(itemsInRing, 1);
                const ringHeight = ORBIT_RING_HEIGHT_TOP - ringIndex * ORBIT_RING_GAP;
                const radius = ORBIT_BASE_RADIUS + ringIndex * ORBIT_RING_RADIUS_STEP;
                entry.orbit = {
                    centerX: 0,
                    radius,
                    height: Math.max(0.75, ringHeight),
                    speed: 0.082 - ringIndex * 0.004 + (seed % 7) * 0.0015,
                    baseAngle: slotAngle + ringOffset,
                    index,
                };
            }
        }

        function addOrbitItem(item) {
            const id = Number(item.id);
            if (!Number.isFinite(id) || seenFeedIds.has(id)) return;
            if (orbitEntries.length >= ORBIT_MAX) {
                const old = orbitEntries.shift();
                if (old) {
                    seenFeedIds.delete(old.id);
                    orbitRoot.remove(old.group);
                    // WebGLカードのリソース解放
                    if (old.webgl) {
                        try { old.webgl.group.remove(old.webgl.mesh); } catch { }
                        releaseOrbitCardGeometry(old.webgl.geometryKey);
                        try { old.webgl.material.dispose(); } catch { }
                        try { old.webgl.texture.dispose(); } catch { }
                    }
                    if (old.isPost) postGlowById.delete(old.id);
                }
            }
            seenFeedIds.add(id);
            const likes = item.kind === 'post' ? Number(item.likes ?? 0) : 0;
            const { group, pointLight, isPost } = createOrbitAnchor(item.kind, likes);
            const label = ORBIT_RENDER_MODE === 'dom' ? createOrbitMiniToast(item) : null;
            if (label) group.add(label);
            const webgl = ORBIT_RENDER_MODE === 'webgl'
                ? createOrbitCardWebGL(item)
                : null;
            if (webgl?.mesh) webgl.mesh.userData.orbitEntryId = id;
            const payload = orbitItemToPayload(item);
            if (webgl) group.add(webgl.group);
            orbitEntries.push({
                id,
                kind: item.kind,
                payload,
                group,
                pointLight,
                isPost,
                orbit: null,
                orbitSlot: _orbitSlotSerial++,
                label,
                webgl,
            });
            if (isPost && pointLight) postGlowById.set(id, { pointLight });
            orbitRoot.add(group);
            assignOrbitParamsForEntry(orbitEntries[orbitEntries.length - 1]);
        }

        const _orbitWorldPos = new THREE.Vector3();
        const _orbitCamLocal = new THREE.Vector3();
        const _treeCamLocal = new THREE.Vector3();
        let _orbitFrame = 0;

        function updateOrbitPositions(elapsedTime) {
            _orbitFrame += 1;
            camera.updateMatrixWorld();
            _treeCamLocal.set(0, treeRoot.position.y + 5, 0)
                .applyMatrix4(camera.matrixWorldInverse);
            const treeCamDepth = -_treeCamLocal.z;
            let sharedYaw = 0;
            if (ORBIT_USE_TREE_CAMERA_YAW) {
                treeRoot.getWorldPosition(_treeWorldPos);
                _treeToCam.copy(camera.position).sub(_treeWorldPos);
                _treeToCam.y = 0;
                sharedYaw = Math.atan2(_treeToCam.x, _treeToCam.z);
            }

            for (const entry of orbitEntries) {
                const o = entry.orbit;
                if (!o) continue;

                const orbitAngle = o.baseAngle + elapsedTime * o.speed;
                const yWobble = Math.sin(elapsedTime * 0.72 + o.index) * 0.04;
                entry.group.position.set(
                    o.centerX + Math.cos(orbitAngle) * o.radius,
                    o.height + yWobble,
                    Math.sin(orbitAngle) * o.radius,
                );

                if (ORBIT_ENABLE_LOD) {
                    const dx = camera.position.x - (orbitRoot.position.x + entry.group.position.x);
                    const dy = camera.position.y - (orbitRoot.position.y + entry.group.position.y);
                    const dz = camera.position.z - (orbitRoot.position.z + entry.group.position.z);
                    const distanceSq = dx * dx + dy * dy + dz * dz;
                    if (
                        distanceSq > ORBIT_FAR_DISTANCE_SQ &&
                        _orbitFrame % ORBIT_FAR_UPDATE_EVERY_N_FRAMES !== 0
                    ) {
                        continue;
                    }
                }

                // orbitRoot は平行移動のみなので、world position は加算で十分。
                _orbitWorldPos.set(
                    orbitRoot.position.x + entry.group.position.x,
                    orbitRoot.position.y + entry.group.position.y,
                    orbitRoot.position.z + entry.group.position.z,
                );
                _orbitCamLocal.copy(_orbitWorldPos).applyMatrix4(camera.matrixWorldInverse);

                const depthFromCam = -_orbitCamLocal.z;
                const behindAmount = Math.max(0, depthFromCam - treeCamDepth);
                const behindNorm = Math.min(1, behindAmount / 10);

                if (ORBIT_RENDER_MODE === 'dom' && entry.label) {
                    const outer = entry.label.element;
                    const inner = outer?.firstElementChild;
                    const opac = 1 - behindNorm * ORBIT_BEHIND_DIM_STRENGTH;
                    const baseScale = ORBIT_CARD_BASE_SCALE;
                    const sc = baseScale * (1 - behindNorm * 0.4);
                    outer.style.opacity = String(opac);
                    if (inner) inner.style.transform = `scale(${sc.toFixed(3)})`;
                    outer.style.zIndex = String(Math.round(1000 + _orbitCamLocal.z * 10));
                }
                if (ORBIT_RENDER_MODE === 'webgl' && entry.webgl) {
                    const opac = 1 - behindNorm * ORBIT_BEHIND_DIM_STRENGTH;
                    entry.webgl.material.opacity = opac;
                    const baseScale = 0.56;
                    const sc = baseScale * (1 - behindNorm * 0.35);
                    entry.webgl.group.scale.setScalar(sc);
                }

                if (ORBIT_USE_TREE_CAMERA_YAW) {
                    entry.group.rotation.set(0, sharedYaw, 0);
                } else {
                    // 旧挙動（カードごとにカメラ追尾）
                    orbitTarget.copy(camera.position);
                    const dx = orbitTarget.x - entry.group.position.x;
                    const dz = orbitTarget.z - entry.group.position.z;
                    entry.group.rotation.set(0, Math.atan2(dx, dz), 0);
                }
            }
        }

        function upsertOrbitFromPayload(p) {
            const rawId = p.feedItemId ?? p.feed_item_id;
            if (rawId == null) return;
            addOrbitItem({
                id: rawId,
                kind: p.kind,
                who: p.who,
                from: p.from,
                content: p.content,
                img: p.img,
                likes: 0,
                createdAt: new Date().toISOString(),
            });
        }

        async function loadInitialFeedSnapshot() {
            if (STATIC_FEED_SNAPSHOT) return STATIC_FEED_SNAPSHOT;
            const r = await fetch('/feed?limit=100');
            if (!r.ok) return null;
            return r.json();
        }

        async function loadFeed() {
            try {
                const data = await loadInitialFeedSnapshot();
                if (!data) return;
                if (typeof data?.totalCount === 'number') {
                    setBlossomTotalCount(data.totalCount);
                }
                const rows = (data.items || []).slice().sort((a, b) => {
                    const ta = Date.parse(a.createdAt || a.created_at || 0) || 0;
                    const tb = Date.parse(b.createdAt || b.created_at || 0) || 0;
                    return ta - tb;
                });
                for (const it of rows) {
                    const idNum = Number(it.id);
                    if (Number.isFinite(idNum)) countedFeedIds.add(idNum);
                    addOrbitItem({
                        id: it.id,
                        kind: it.kind,
                        who: it.who,
                        from: it.from,
                        content: it.content,
                        img: it.img,
                        likes: it.likes,
                        createdAt: it.createdAt || it.created_at,
                    });
                }
                // totalCount が無い（旧サーバ等）場合は、取得件数を暫定の累計として扱う
                if (typeof data?.totalCount !== 'number') {
                    setBlossomTotalCount(Math.max(blossomTotalCount, rows.length));
                }
            } catch (e) {
                console.warn('[sakurasake-screen] feed load failed', e);
            }
        }

        // --- 6.5 WebSocket（スマホ更新をスクリーンへ反映） ---
        const toastOverlayEl = document.getElementById('toastOverlay');
        const toastCardEl = document.getElementById('toastCard');
        const toastWhoEl = document.getElementById('toastWho');
        const toastMessageEl = document.getElementById('toastMessage');
        const toastGiftNoteEl = document.getElementById('toastGiftNote');
        const toastImgWrapEl = document.getElementById('toastImgWrap');
        const toastImgEl = document.getElementById('toastImg');

        // 既定でコンソールに出す。うるさいときは URL に ?screenDebug=0 か localStorage sakurasakeScreenDebug=0
        const _screenDebugParam = new URLSearchParams(location.search).get('screenDebug');
        const _ls =
            typeof localStorage !== 'undefined' ? localStorage.getItem('sakurasakeScreenDebug') : null;
        const SCREEN_DEBUG =
            _screenDebugParam === '0' || _ls === '0'
                ? false
                : _screenDebugParam === '1' || _ls === '1' || _screenDebugParam === null;
        const screenLog = (...args) => {
            if (SCREEN_DEBUG) console.log('[sakurasake-screen]', ...args);
        };

        const notifyQueue = [];
        let isToastShowing = false;
        let lastNotifiedUpdatedAt = null;
        let activeToastMode = null;
        let toastHideTimer = null;
        let toastExitTimer = null;

        function clearToastTimers() {
            if (toastHideTimer != null) {
                window.clearTimeout(toastHideTimer);
                toastHideTimer = null;
            }
            if (toastExitTimer != null) {
                window.clearTimeout(toastExitTimer);
                toastExitTimer = null;
            }
        }

        function showToastNow(payload, options = {}) {
            if (!toastOverlayEl || !toastWhoEl || !toastMessageEl) {
                screenLog('showToastNow: DOM missing', {
                    toastOverlayEl: !!toastOverlayEl,
                    toastWhoEl: !!toastWhoEl,
                    toastMessageEl: !!toastMessageEl,
                });
                return;
            }
            const { title, subtitle, who } = buildToastContent(payload);
            const kind = payload?.kind;
            const interactive = options?.interactive === true;

            if (toastCardEl) {
                toastCardEl.classList.toggle('toast-kind-comment', kind === 'comment');
            }

            toastWhoEl.textContent = title;
            toastMessageEl.textContent = subtitle;
            if (toastGiftNoteEl) toastGiftNoteEl.textContent = giftNoteText(kind, who);

            const showImg =
                (kind === 'like' || kind === 'post') &&
                typeof payload?.img === 'string' &&
                payload.img.trim().length > 0;
            if (toastImgWrapEl && toastImgEl) {
                if (showImg) {
                    toastImgWrapEl.classList.add('is-visible');
                    toastImgWrapEl.setAttribute('aria-hidden', 'false');
                    toastImgEl.onerror = () => {
                        toastImgWrapEl.classList.remove('is-visible');
                        toastImgWrapEl.setAttribute('aria-hidden', 'true');
                        toastImgEl.removeAttribute('src');
                    };
                    toastImgEl.alt = '';
                    toastImgEl.src = payload.img.trim();
                } else {
                    toastImgWrapEl.classList.remove('is-visible');
                    toastImgWrapEl.setAttribute('aria-hidden', 'true');
                    toastImgEl.removeAttribute('src');
                }
            }

            toastOverlayEl.classList.toggle('is-interactive', interactive);
            toastOverlayEl.setAttribute('aria-hidden', 'false');
            toastOverlayEl.classList.add('is-visible');
            screenLog('toast visible', { title, subtitle, kind });
        }

        function hideToastNow() {
            if (!toastOverlayEl) return;
            toastOverlayEl.classList.remove('is-visible');
            toastOverlayEl.classList.remove('is-interactive');
            toastOverlayEl.setAttribute('aria-hidden', 'true');
        }

        function normalizeOrbitEntryId(entryId) {
            if (entryId == null) return null;
            const id = Number(entryId);
            return Number.isFinite(id) ? id : null;
        }

        function findOrbitEntryById(entryId) {
            const id = normalizeOrbitEntryId(entryId);
            if (id == null) return null;
            return orbitEntries.find((entry) => entry.id === id) || null;
        }

        function pickOrbitEntryAt(clientX, clientY) {
            if (ORBIT_RENDER_MODE !== 'webgl') return null;
            const canvasEl = renderer?.domElement;
            if (!canvasEl) return null;
            const rect = canvasEl.getBoundingClientRect();
            if (rect.width <= 0 || rect.height <= 0) return null;

            orbitPointerNdc.set(
                ((clientX - rect.left) / rect.width) * 2 - 1,
                -((clientY - rect.top) / rect.height) * 2 + 1,
            );
            orbitRaycaster.setFromCamera(orbitPointerNdc, camera);

            const meshes = orbitEntries
                .map((entry) => entry.webgl?.mesh)
                .filter(Boolean);
            if (meshes.length === 0) return null;

            const hit = orbitRaycaster.intersectObjects(meshes, false)[0];
            return hit ? findOrbitEntryById(hit.object?.userData?.orbitEntryId) : null;
        }

        function finishToast(mode) {
            toastExitTimer = window.setTimeout(() => {
                toastExitTimer = null;
                if (activeToastMode !== mode) return;
                activeToastMode = null;
                isToastShowing = false;
                pumpQueue();
            }, 260);
        }

        function showPickedOrbitCard(payload) {
            clearToastTimers();
            activeToastMode = 'manual';
            isToastShowing = true;
            showToastNow(payload, { interactive: true });
        }

        function closePickedOrbitCard() {
            if (activeToastMode !== 'manual') return;
            clearToastTimers();
            hideToastNow();
            finishToast('manual');
        }

        function pumpQueue() {
            if (isToastShowing) return;
            const next = notifyQueue.shift();
            if (!next) return;
            isToastShowing = true;
            activeToastMode = 'queue';

            screenLog('pumpQueue: show', { queueLeft: notifyQueue.length, payload: next });
            showToastNow(next, { interactive: false });
            toastHideTimer = window.setTimeout(() => {
                toastHideTimer = null;
                hideToastNow();
                // フェードアウトの遷移を待ってから次へ
                finishToast('queue');
            }, 5000);
        }

        function enqueueNotification(payload) {
            notifyQueue.push(payload);
            screenLog('enqueueNotification', { queueLen: notifyQueue.length, payload });
            pumpQueue();
        }

        if (toastOverlayEl) {
            toastOverlayEl.addEventListener('click', () => {
                closePickedOrbitCard();
            });
        }
        if (toastCardEl) {
            toastCardEl.addEventListener('click', (event) => {
                event.stopPropagation();
            });
        }
        window.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') closePickedOrbitCard();
        });
        if (renderer?.domElement) {
            renderer.domElement.addEventListener('click', (event) => {
                if (toastOverlayEl?.classList.contains('is-interactive')) return;
                const entry = pickOrbitEntryAt(event.clientX, event.clientY);
                if (!entry?.payload) return;
                showPickedOrbitCard(entry.payload);
            });
        }

        function handleProgressPayload(s) {
            if (!s || typeof s !== 'object') return;

            const tp = s.targetPostId ?? s.target_post_id;
            const pl = s.postLikes ?? s.post_likes;
            if (tp != null && pl != null) {
                applyPostGlow(Number(tp), Number(pl));
            }

            if (s.kind === 'post' || s.kind === 'comment') {
                const rawId = s.feedItemId ?? s.feed_item_id;
                const idNum = Number(rawId);
                if (Number.isFinite(idNum) && !countedFeedIds.has(idNum)) {
                    countedFeedIds.add(idNum);
                    setBlossomTotalCount(blossomTotalCount + 1);
                }
                upsertOrbitFromPayload(s);
            }

            const cStr = contentText(s);
            screenLog('state payload', {
                content: cStr,
                kind: s?.kind,
                who: s?.who,
                from: s?.from,
                img: s?.img,
                updatedAt: s?.updatedAt,
                keys: Object.keys(s),
            });

            const ua = Number(s?.updatedAt ?? s?.updated_at);
            if (!s?.kind) {
                if (Number.isFinite(ua)) lastNotifiedUpdatedAt = ua;
                screenLog('toast skip: no kind');
                return;
            }

            if (Number.isFinite(ua)) {
                if (lastNotifiedUpdatedAt === ua) {
                    screenLog('toast skip: duplicate updatedAt', ua);
                    return;
                }
                lastNotifiedUpdatedAt = ua;
            } else {
                screenLog('toast skip: no updatedAt', { sample: s });
                return;
            }

            enqueueNotification({
                who: s?.who,
                content: s?.content,
                kind: s?.kind,
                img: s?.img,
                from: s?.from,
                updatedAt: ua,
            });
        }

        const WS_BACKOFF_START_MS = 1000;
        const WS_BACKOFF_MAX_MS = 30000;
        let screenWs = null;
        let wsReconnectTimer = null;
        let wsBackoffMs = WS_BACKOFF_START_MS;
        let wsConnectGeneration = 0;

        function screenWsUrl() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            return `${proto}//${location.host}/ws`;
        }

        function scheduleWsReconnect() {
            if (wsReconnectTimer != null) return;
            const delay = wsBackoffMs;
            wsBackoffMs = Math.min(WS_BACKOFF_MAX_MS, wsBackoffMs * 2);
            wsReconnectTimer = window.setTimeout(() => {
                wsReconnectTimer = null;
                connectScreenWebSocket();
            }, delay);
            screenLog('WebSocket reconnect scheduled', { delayMs: delay, nextCapMs: WS_BACKOFF_MAX_MS });
        }

        function connectScreenWebSocket() {
            if (wsReconnectTimer != null) {
                clearTimeout(wsReconnectTimer);
                wsReconnectTimer = null;
            }

            const gen = ++wsConnectGeneration;

            if (screenWs) {
                try {
                    screenWs.close();
                } catch (_) {
                    /* ignore */
                }
                screenWs = null;
            }

            let ws;
            try {
                ws = new WebSocket(screenWsUrl());
            } catch (e) {
                console.warn('[sakurasake-screen] WebSocket constructor failed', e);
                scheduleWsReconnect();
                return;
            }

            screenWs = ws;

            ws.addEventListener('open', () => {
                if (gen !== wsConnectGeneration) return;
                screenLog('WebSocket open', { url: ws.url, readyState: ws.readyState });
                wsBackoffMs = WS_BACKOFF_START_MS;
            });

            ws.addEventListener('message', (ev) => {
                if (gen !== wsConnectGeneration) return;
                let s = null;
                try {
                    s = JSON.parse(ev.data);
                } catch (err) {
                    screenLog('WebSocket parse error', err, 'raw:', ev.data?.slice?.(0, 200));
                    return;
                }
                handleProgressPayload(s);
            });

            ws.addEventListener('close', () => {
                if (gen !== wsConnectGeneration) return;
                screenLog('WebSocket closed');
                screenWs = null;
                scheduleWsReconnect();
            });

            ws.addEventListener('error', (err) => {
                console.warn('[sakurasake-screen] WebSocket error', err);
            });
        }

        loadFeed().finally(() => {
            if (STATIC_LIVE_UPDATES_ENABLED) connectScreenWebSocket();
        });

        // --- 7. アニメーションループ ---
        const TARGET_FPS = 45;
        const TARGET_INTERVAL_MS = 1000 / TARGET_FPS;
        let _rafId = null;
        let _startTs = null;
        let _lastRenderTs = 0;
        /** タブ非表示直前までの経過秒（軌道位相の連続用） */
        let _lastElapsedTimeForPause = 0;
        let _lastInputTs = -1;
        let _skipHeavyUntilTs = -1;
        // 重い場合は false にすると「回転/揺れ」を無効化できます（コードは残す）
        const ENABLE_TREE_ROTATION = false;
        const ENABLE_CAMERA_SWAY = false;

        function markRecentInput() {
            const t = performance.now();
            _lastInputTs = t;
            // 入力直後は1フレームぶん重い更新を避けて、INPのpresentationを優先
            _skipHeavyUntilTs = t + 50;
        }

        const SCROLL_BLOCK_KEYS = new Set([
            ' ',
            'Spacebar',
            'ArrowUp',
            'ArrowDown',
            'PageUp',
            'PageDown',
            'Home',
            'End',
        ]);

        function preventMeaninglessScroll(event) {
            event.preventDefault();
        }

        function handleWindowKeydown(event) {
            if (SCROLL_BLOCK_KEYS.has(event.key)) {
                event.preventDefault();
                return;
            }
            markRecentInput();
        }

        window.addEventListener('keydown', handleWindowKeydown, { passive: false });
        window.addEventListener('pointerdown', markRecentInput, { passive: true });
        window.addEventListener('wheel', preventMeaninglessScroll, { passive: false });
        window.addEventListener('touchmove', preventMeaninglessScroll, { passive: false });

        function frame(ts) {
            _rafId = requestAnimationFrame(frame);
            const t = typeof ts === 'number' ? ts : performance.now();
            if (_startTs == null) _startTs = t;

            // 入力直後はWebGL側の重い更新を1回飛ばして、HTML側の描画を通しやすくする
            if (_skipHeavyUntilTs > 0 && t < _skipHeavyUntilTs) return;

            const sinceLast = t - _lastRenderTs;
            if (sinceLast < TARGET_INTERVAL_MS) return;
            _lastRenderTs = t;

            const elapsedTime = (t - _startTs) / 1000;
            _lastElapsedTimeForPause = elapsedTime;
            const deltaTime = Math.min(0.05, Math.max(0.001, sinceLast / 1000));
            petalUniforms.uTime.value = elapsedTime;

            if (ENABLE_TREE_ROTATION) {
                // 木全体を非常にゆっくり回転させて、立体感を見せる
                treeRoot.rotation.y = Math.sin(elapsedTime * 0.05) * 0.3;
                invalidateStaticCache();
            }

            if (ENABLE_CAMERA_SWAY) {
                // カメラ自体も少し揺らす（手持ちカメラのような空気感）
                camera.position.x = Math.sin(elapsedTime * 0.1) * 3;
                camera.lookAt(0, 6, 0);
                // カメラが変わるならキャッシュがズレるので必要時だけ再生成
                invalidateStaticCache();
            }

            updateOrbitPositions(elapsedTime);

            // 木キャッシュが汚れていれば更新（花/ライト/フォグが変わったときだけ）
            rebuildStaticCacheIfNeeded();

            renderer.setRenderTarget(null);
            renderer.clear(true, true, true);
            renderer.render(staticBgScene, staticBgCamera);
            renderer.clearDepth();

            if (composer) {
                composer.render();
            } else {
                renderer.render(dynamicScene, camera);
            }
            renderWeatherRain(deltaTime);
            if (labelRenderer) labelRenderer.render(dynamicScene, camera);
        }

        /**
         * @param {boolean} [resumeFromHidden] visibility 復帰時 true。経過時間を途切れさせない。
         */
        function startLoop(resumeFromHidden = false) {
            if (_rafId != null) return;
            if (resumeFromHidden && _lastElapsedTimeForPause > 0) {
                _startTs = performance.now() - _lastElapsedTimeForPause * 1000;
                _lastRenderTs = performance.now();
            } else {
                _startTs = null;
                _lastRenderTs = 0;
            }
            _rafId = requestAnimationFrame(frame);
        }

        function stopLoop() {
            if (_rafId == null) return;
            cancelAnimationFrame(_rafId);
            _rafId = null;
        }

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                stopLoop();
                return;
            }
            startLoop(true);
        });

        // 初回キャッシュ生成
        invalidateStaticCache();
        rebuildStaticCacheIfNeeded();
        startLoop();

        // --- 8. ウィンドウリサイズ対応 ---
        let _resizeRaf = null;
        function applyResize() {
            _resizeRaf = null;
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            resizeWeatherRainCanvas();
            if (composer) composer.setSize(w, h);
            if (labelRenderer) labelRenderer.setSize(w, h);
            invalidateStaticCache();
        }

        window.addEventListener('resize', () => {
            if (_resizeRaf != null) return;
            _resizeRaf = requestAnimationFrame(applyResize);
        });
    </script>
</body>

</html>
