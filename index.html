<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js エモい木</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            /* エモい夕暮れのグラデーション背景 */
            background: black;

        }

        canvas {
            display: block;
            position: relative;
            z-index: 0;
        }

        #ui {
            position: absolute;
            z-index: 10;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            width: min(720px, calc(100vw - 24px));
            padding: 10px 12px;
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.28);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
            color: rgba(255, 255, 255, 0.86);
            font-family: sans-serif;
            pointer-events: auto;
            user-select: none;
        }

        #ui .row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #ui label {
            font-size: 13px;
            letter-spacing: 0.02em;
            opacity: 0.92;
            white-space: nowrap;
        }

        #sakuraSlider {
            flex: 1;
            accent-color: #ffb7c5;
        }

        #sakuraValue {
            font-variant-numeric: tabular-nums;
            font-size: 13px;
            opacity: 0.9;
            min-width: 3ch;
            text-align: right;
        }

        #info {
            position: absolute;
            z-index: 10;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-family: sans-serif;
            font-size: 14px;
            pointer-events: none;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        }

        /* --- 進捗通知オーバーレイ（中央表示） --- */
        #toastOverlay {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            padding: 18px;
            /* WebGL canvas が body 末尾に追加されると手前に描画されやすいので最前面に固定 */
            z-index: 10000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 220ms ease;
            background: radial-gradient(900px 520px at 50% 46%, rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.75));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        #toastOverlay.is-visible {
            opacity: 1;
        }

        #toastCard {
            width: min(760px, calc(100vw - 24px));
            border-radius: 18px;
            background: rgba(0, 0, 0, 0.42);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 18px 55px rgba(0, 0, 0, 0.55);
            color: rgba(255, 255, 255, 0.92);
            font-family: sans-serif;
            padding: 18px 18px 16px;
            transform: translateY(10px) scale(0.99);
            opacity: 0;
            transition: transform 220ms ease, opacity 220ms ease;
        }

        #toastOverlay.is-visible #toastCard {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        #toastWho {
            font-weight: 800;
            font-size: 26px;
            letter-spacing: 0.02em;
            line-height: 1.1;
            margin-bottom: 10px;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.55);
        }

        #toastMessage {
            font-size: 18px;
            line-height: 1.55;
            letter-spacing: 0.01em;
            color: rgba(255, 255, 255, 0.88);
            text-shadow: 0 1px 10px rgba(0, 0, 0, 0.6);
            overflow-wrap: anywhere;
            word-break: break-word;
            white-space: pre-wrap;
        }

        @media (max-width: 520px) {
            #toastWho {
                font-size: 22px;
            }

            #toastMessage {
                font-size: 16px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            #toastOverlay,
            #toastCard {
                transition: none !important;
            }
        }
    </style>
</head>

<body>
    <div id="ui">
        <div class="row">
            <label for="sakuraSlider">桜</label>
            <input id="sakuraSlider" type="range" min="0" max="1" step="0.01" value="0.35" />
            <div id="sakuraValue">35</div>
        </div>
    </div>
    <div id="info">ゆっくりと視点が回転します</div>
    <div id="toastOverlay" aria-hidden="true">
        <div id="toastCard">
            <div id="toastWho"></div>
            <div id="toastMessage"></div>
        </div>
    </div>

    <!-- Three.js のインポート -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
</script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- 1. 基本セットアップ ---
        const scene = new THREE.Scene();

        // 空気感を出すためのフォグ（霧）を追加。背景色に合わせて夕暮れ色に。
        scene.fog = new THREE.FogExp2(0xd66b5d, 0.025);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        // カメラを引いて、少し上から見下ろす位置に配置（画面に収めるための重要ポイント）
        camera.position.set(0, 8, 22);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // パフォーマンス最適化
        document.body.appendChild(renderer.domElement);
        const toastOverlayMount = document.getElementById('toastOverlay');
        if (toastOverlayMount) document.body.appendChild(toastOverlayMount);

        // --- 2. ライティング（光の演出） ---
        // 全体を包む柔らかな環境光（少し青みを帯びた夕暮れの影）
        const ambientLight = new THREE.AmbientLight(0x404060, 2.0);
        scene.add(ambientLight);

        // 夕日の強い光（オレンジ色）
        const sunLight = new THREE.DirectionalLight(0xffa500, 3.5);
        sunLight.position.set(10, 15, 10);
        scene.add(sunLight);

        // --- 3. ポストプロセッシング（Bloom効果でエモさを強調） ---
        // 重い場合は false にすると Bloom を無効化できます（コードは残す）
        const ENABLE_BLOOM = false;

        let composer = null;
        let bloomPass = null;
        if (ENABLE_BLOOM) {
            const renderScene = new RenderPass(scene, camera);
            bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                1.2,  // 光の強さ
                0.5,  // 光の広がり半径
                0.6   // 光り始める閾値（数値を下げると暗い部分も光る）
            );
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);
        }

        // --- 4. 木を生成する関数（再帰） ---
        const treeRoot = new THREE.Group();
        scene.add(treeRoot);

        // 幹のマテリアルを事前に作成（パフォーマンス向上のため）
        const trunkMaterial = new THREE.MeshStandardMaterial({
            color: 0x2d1f1a, // 暗い焦げ茶色
            roughness: 0.9
        });

        const petalMaterial = new THREE.MeshBasicMaterial({
            color: 0xffb7c5, // 桜色
            transparent: true,
            opacity: 0.85,
            side: THREE.DoubleSide
        });

        const petalShape = new THREE.Shape();
        petalShape.moveTo(0, 0);
        petalShape.bezierCurveTo(0.15, 0.1, 0.3, 0.3, 0.2, 0.5);
        petalShape.bezierCurveTo(0.1, 0.6, 0.05, 0.5, 0, 0.45);
        petalShape.bezierCurveTo(-0.05, 0.5, -0.1, 0.6, -0.2, 0.5);
        petalShape.bezierCurveTo(-0.3, 0.3, -0.15, 0.1, 0, 0);

        const petalGeometry = new THREE.ShapeGeometry(petalShape);
        petalGeometry.scale(0.8, 0.8, 0.8);
        petalGeometry.translate(0, 0.1, 0);

        const flowerMeshes = [];
        const FLOWER_DENSITY = 0.55; // 数を減らす（見た目はスケールで補償）

        function createBranch(parent, length, width, depth) {
            // 【New】最大深度を増やし、より複雑な枝振りに
            const maxDepth = 7;
            if (depth > maxDepth) return;

            // 枝の作成
            const branchGeo = new THREE.CylinderGeometry(width * 0.65, width, length, 4);
            // 原点を枝の底面にするためにジオメトリを移動
            branchGeo.translate(0, length / 2, 0);
            const branchMesh = new THREE.Mesh(branchGeo, trunkMaterial);
            parent.add(branchMesh);

            // 枝の先端（花を咲かせる、または次の枝を伸ばす位置）
            const tipPosition = new THREE.Vector3(0, length, 0);

            // 先端付近に花を咲かせる（表示数はスライダーで制御）
            if (depth >= maxDepth - 2) {
                const flowersCount = depth === maxDepth ? 4 : (depth === maxDepth - 1 ? 2 : 1);
                for (let i = 0; i < flowersCount; i++) {
                    const flowerGroup = new THREE.Group();
                    for (let j = 0; j < 5; j++) {
                        const petal = new THREE.Mesh(petalGeometry, petalMaterial);
                        petal.rotation.z = (Math.PI * 2 / 5) * j;
                        petal.rotation.x = 0.2;
                        flowerGroup.add(petal);
                    }

                    flowerGroup.position.copy(tipPosition);
                    flowerGroup.position.x += (Math.random() - 0.5) * 2.0;
                    flowerGroup.position.y += (Math.random() - 0.5) * 2.0;
                    flowerGroup.position.z += (Math.random() - 0.5) * 2.0;
                    flowerGroup.rotation.set(
                        Math.random() * Math.PI,
                        Math.random() * Math.PI,
                        Math.random() * Math.PI
                    );

                    const scale = 0.5 + Math.random() * 0.5;
                    flowerGroup.scale.set(scale, scale, scale);
                    flowerGroup.userData.baseScale = scale;
                    flowerGroup.visible = false;

                    branchMesh.add(flowerGroup);
                    flowerMeshes.push(flowerGroup);
                }
            }

            // 次の枝を生やす
            if (depth < maxDepth) {
                // 枝の分岐数を制御（先に行くほど2本になりやすくし、処理落ちを防ぐ）
                const numBranches = (depth === 0) ? 3 : (depth > 4 ? 2 : (Math.random() > 0.3 ? 2 : 3));

                for (let i = 0; i < numBranches; i++) {
                    const nextBranchGroup = new THREE.Group();
                    nextBranchGroup.position.copy(tipPosition);

                    // 枝の広がり角度（上の方ほど横に広がりやすくする）
                    const angleX = (Math.random() - 0.5) * (1.0 + depth * 0.15);
                    const angleZ = (Math.random() - 0.5) * (1.0 + depth * 0.15);
                    nextBranchGroup.rotation.set(angleX, 0, angleZ);

                    // 木全体が横にふんわり広がるようにY軸も回転
                    nextBranchGroup.rotation.y = Math.random() * Math.PI * 2;

                    branchMesh.add(nextBranchGroup);

                    // 再帰呼び出し（長さと太さを少しずつ小さくする）
                    createBranch(nextBranchGroup, length * (0.75 + Math.random() * 0.1), width * 0.65, depth + 1);
                }
            }
        }

        // 【New】木の生成開始（初期の長さを5.5、太さを1.4にして立派な大木に）
        createBranch(treeRoot, 5.5, 1.4, 0);
        // 木全体のY座標を下げて、画面中央に収まりやすくする
        treeRoot.position.y = -10;

        // カメラを引いて、大きな木全体を捉える
        camera.position.set(0, 10, 32);
        camera.lookAt(0, 6, 0);

        // --- 5. 舞い散る花びら（InstancedMesh） ---
        // 重い場合はここを false にすると「落ちる花びら」を無効化できます（コードは残す）
        const ENABLE_FALLING_PETALS = false;
        const particlesMax = 900;
        // CPUで毎フレーム全インスタンスの行列を書き換えると、枚数増加で一気に重くなる。
        // ここでは「初期配置だけCPU」「落下/揺れはGPU(シェーダ)で時間から計算」にして、
        // スライダーで枚数を増やしてもCPU負荷が増えにくい構造にする。
        const fallingPetals = new THREE.InstancedMesh(petalGeometry, petalMaterial.clone(), particlesMax);
        // 追加パラメータ（インスタンス属性）
        const aSpeedY = new Float32Array(particlesMax);
        const aPhaseX = new Float32Array(particlesMax);
        const aPhaseZ = new Float32Array(particlesMax);
        const aAmp = new Float32Array(particlesMax);
        const aStartY = new Float32Array(particlesMax);
        const aRange = new Float32Array(particlesMax);
        const aDrift = new Float32Array(particlesMax);

        // 時間ユニフォーム（GPUで落下量を算出）
        const petalUniforms = { uTime: { value: 0 } };
        const dummy = new THREE.Object3D();
        for (let i = 0; i < particlesMax; i++) {
            const x = (Math.random() - 0.5) * 40;
            const y = Math.random() * 30 - 5;
            const z = (Math.random() - 0.5) * 40;

            dummy.position.set(x, y, z);
            dummy.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
            const scale = 0.4 + Math.random() * 0.4;
            dummy.scale.set(scale, scale, scale);
            dummy.updateMatrix();
            fallingPetals.setMatrixAt(i, dummy.matrix);

            // 各インスタンスの落下・揺れパラメータ
            aSpeedY[i] = Math.random() * 0.55 + 0.35;        // 落下スピード（単位/秒、シェーダ側で使用）
            aPhaseX[i] = Math.random() * Math.PI * 2;        // 揺れ位相
            aPhaseZ[i] = Math.random() * Math.PI * 2;
            aAmp[i] = Math.random() * 0.12 + 0.04;           // 揺れ振幅
            aStartY[i] = y;                                  // 初期Y
            aRange[i] = Math.random() * 34 + 18;             // ループ範囲
            aDrift[i] = (Math.random() - 0.5) * 0.35;        // 横流れ
        }
        // InstancedBufferAttributes を追加
        fallingPetals.geometry.setAttribute('aSpeedY', new THREE.InstancedBufferAttribute(aSpeedY, 1));
        fallingPetals.geometry.setAttribute('aPhaseX', new THREE.InstancedBufferAttribute(aPhaseX, 1));
        fallingPetals.geometry.setAttribute('aPhaseZ', new THREE.InstancedBufferAttribute(aPhaseZ, 1));
        fallingPetals.geometry.setAttribute('aAmp', new THREE.InstancedBufferAttribute(aAmp, 1));
        fallingPetals.geometry.setAttribute('aStartY', new THREE.InstancedBufferAttribute(aStartY, 1));
        fallingPetals.geometry.setAttribute('aRange', new THREE.InstancedBufferAttribute(aRange, 1));
        fallingPetals.geometry.setAttribute('aDrift', new THREE.InstancedBufferAttribute(aDrift, 1));

        // マテリアルの頂点シェーダを拡張（時間でオフセット）
        // 透明/両面などの既存設定を保ちつつ、インスタンス単位で位置を動かす。
        fallingPetals.material.onBeforeCompile = (shader) => {
            shader.uniforms.uTime = petalUniforms.uTime;
            shader.vertexShader =
                `
                uniform float uTime;
                attribute float aSpeedY;
                attribute float aPhaseX;
                attribute float aPhaseZ;
                attribute float aAmp;
                attribute float aStartY;
                attribute float aRange;
                attribute float aDrift;
                ` + shader.vertexShader;

            shader.vertexShader = shader.vertexShader.replace(
                '#include <begin_vertex>',
                `
                #include <begin_vertex>
                // インスタンス基準位置（instanceMatrixの平行移動成分）
                vec3 iPos = vec3(instanceMatrix[3][0], instanceMatrix[3][1], instanceMatrix[3][2]);
                // 落下: startY から range を周期的にループ
                float fall = mod(uTime * aSpeedY + aPhaseX, aRange);
                float yNow = aStartY - fall;
                // 揺れ: sin/cos（GPU側で一括処理）
                float swayX = sin(uTime * 1.7 + aPhaseX) * aAmp;
                float swayZ = cos(uTime * 1.3 + aPhaseZ) * aAmp;
                // 横流れ: 落下量に比例したドリフト
                float drift = (fall / max(aRange, 0.001)) * aDrift;
                transformed.x += swayX + drift;
                transformed.z += swayZ;
                // instanceMatrix のY(=iPos.y) + (yNow - aStartY) を適用
                transformed.y += (yNow - aStartY);
                `
            );
        };
        // Three がコンパイルしたシェーダを使い回せるように
        fallingPetals.material.needsUpdate = true;

        fallingPetals.count = 0;
        fallingPetals.visible = ENABLE_FALLING_PETALS;
        scene.add(fallingPetals);

        // --- 6. UI（スライダーで桜を増減） ---
        const sakuraSlider = document.getElementById('sakuraSlider');
        const sakuraValue = document.getElementById('sakuraValue');
        let sakuraAmount = Number(sakuraSlider?.value ?? 0.35);

        const basePixelRatio = Math.min(window.devicePixelRatio, 2);
        let lastQualityKey = '';

        function setRenderQuality(amount01) {
            // 0.5 を超えると急に重くなりやすいので、そこから先は自動で品質を落としてFPSを守る
            const a = Math.min(1, Math.max(0, amount01));
            const overload = Math.max(0, a - 0.5) / 0.5; // 0..1

            // ピクセル比を下げる（最大で -35%）
            const pr = Math.max(0.9, basePixelRatio * (1 - 0.35 * overload));

            // Bloomも負荷が大きいので、高密度時は弱める（見た目の印象は残す）
            const bloomStrength = 1.2 * (1 - 0.45 * overload);
            const bloomRadius = 0.5 * (1 - 0.35 * overload);

            // バッファ再確保を減らすため、値がほぼ同じなら何もしない
            const key = `${pr.toFixed(2)}|${bloomStrength.toFixed(2)}|${bloomRadius.toFixed(2)}`;
            if (key === lastQualityKey) return;
            lastQualityKey = key;

            renderer.setPixelRatio(pr);
            renderer.setSize(window.innerWidth, window.innerHeight);
            if (composer) composer.setSize(window.innerWidth, window.innerHeight);
            if (bloomPass) {
                bloomPass.strength = bloomStrength;
                bloomPass.radius = bloomRadius;
            }
        }

        function applySakuraAmount(amount) {
            const a = Math.min(1, Math.max(0, amount));
            sakuraAmount = a;
            if (sakuraValue) sakuraValue.textContent = String(Math.round(a * 100));

            // 花の「数」を意図的に減らし、代わりにサイズを大きくして見栄えを維持する
            const visibleFlowers = Math.round(a * flowerMeshes.length * FLOWER_DENSITY);
            // 面積感を保つため、密度の平方根で補償（数が減るほど大きく）
            const maxMul = 1 / Math.sqrt(Math.max(0.12, FLOWER_DENSITY));
            // スライダーが低い時は肥大化しすぎないように徐々に効かせる
            const sizeMul = 1 + (maxMul - 1) * a;
            for (let i = 0; i < flowerMeshes.length; i++) {
                const fg = flowerMeshes[i];
                const isVisible = i < visibleFlowers;
                fg.visible = isVisible;
                const baseScale = Number(fg.userData?.baseScale) || 1;
                const s = baseScale * (isVisible ? sizeMul : 1);
                fg.scale.set(s, s, s);
            }

            if (ENABLE_FALLING_PETALS) {
                fallingPetals.count = Math.round(a * particlesMax);
            } else {
                fallingPetals.count = 0;
            }
            setRenderQuality(a);
        }

        sakuraSlider?.addEventListener('input', (e) => {
            const v = Number(e.target.value);
            applySakuraAmount(Number.isFinite(v) ? v : 0);
        });

        applySakuraAmount(sakuraAmount);

        // --- 6.5 WebSocket（スマホ更新をスクリーンへ反映） ---
        const infoEl = document.getElementById('info');
        const toastOverlayEl = document.getElementById('toastOverlay');
        const toastWhoEl = document.getElementById('toastWho');
        const toastMessageEl = document.getElementById('toastMessage');

        // 既定でコンソールに出す。うるさいときは URL に ?screenDebug=0 か localStorage sakurasakeScreenDebug=0
        const _screenDebugParam = new URLSearchParams(location.search).get('screenDebug');
        const _ls =
            typeof localStorage !== 'undefined' ? localStorage.getItem('sakurasakeScreenDebug') : null;
        const SCREEN_DEBUG =
            _screenDebugParam === '0' || _ls === '0'
                ? false
                : _screenDebugParam === '1' || _ls === '1' || _screenDebugParam === null;
        const screenLog = (...args) => {
            if (SCREEN_DEBUG) console.log('[sakurasake-screen]', ...args);
        };

        function updateInfo(who, progress01) {
            if (!infoEl) return;
            const whoText = (who ?? '').toString().trim();
            const pct = Number.isFinite(progress01) ? Math.round(progress01 * 100) : null;
            if (whoText && pct !== null) {
                infoEl.textContent = `${whoText} ${pct}%`;
            } else if (pct !== null) {
                infoEl.textContent = `${pct}%`;
            } else if (whoText) {
                infoEl.textContent = whoText;
            } else {
                infoEl.textContent = 'ゆっくりと視点が回転します';
            }
        }

        const notifyQueue = [];
        let isToastShowing = false;
        let lastNotifiedUpdatedAt = null;

        function toPctText(progress01) {
            const p = Number(progress01);
            if (!Number.isFinite(p)) return null;
            return `${Math.round(p * 100)}%`;
        }

        function buildToastContent(payload) {
            const who = (payload?.who ?? '').toString().trim();
            const msg = (payload?.message ?? '').toString().replace(/\s+/g, ' ').trim();
            const pct = toPctText(payload?.progress);
            const messageText = msg || pct || '更新が届きました';
            return { who, messageText };
        }

        function showToastNow(payload) {
            if (!toastOverlayEl || !toastWhoEl || !toastMessageEl) {
                screenLog('showToastNow: DOM missing', {
                    toastOverlayEl: !!toastOverlayEl,
                    toastWhoEl: !!toastWhoEl,
                    toastMessageEl: !!toastMessageEl,
                });
                return;
            }
            const { who, messageText } = buildToastContent(payload);

            toastWhoEl.textContent = who || 'だれか';
            toastMessageEl.textContent = messageText;

            toastOverlayEl.setAttribute('aria-hidden', 'false');
            toastOverlayEl.classList.add('is-visible');
            screenLog('toast visible', { who: toastWhoEl.textContent, messageText });
        }

        function hideToastNow() {
            if (!toastOverlayEl) return;
            toastOverlayEl.classList.remove('is-visible');
            toastOverlayEl.setAttribute('aria-hidden', 'true');
        }

        function pumpQueue() {
            if (isToastShowing) return;
            const next = notifyQueue.shift();
            if (!next) return;
            isToastShowing = true;

            screenLog('pumpQueue: show', { queueLeft: notifyQueue.length, payload: next });
            showToastNow(next);
            window.setTimeout(() => {
                hideToastNow();
                // フェードアウトの遷移を待ってから次へ
                window.setTimeout(() => {
                    isToastShowing = false;
                    pumpQueue();
                }, 260);
            }, 5000);
        }

        function enqueueNotification(payload) {
            notifyQueue.push(payload);
            screenLog('enqueueNotification', { queueLen: notifyQueue.length, payload });
            pumpQueue();
        }

        function handleProgressPayload(s) {
            if (!s || typeof s !== 'object') return;

            const p = Number(s?.progress);
            screenLog('progress payload', {
                progress: p,
                who: s?.who,
                message: s?.message,
                updatedAt: s?.updatedAt,
                keys: Object.keys(s),
            });

            if (Number.isFinite(p)) {
                applySakuraAmount(Math.min(1, Math.max(0, p)));
                if (sakuraSlider) sakuraSlider.value = String(p);
            }
            updateInfo(s?.who, p);

            // 接続直後の初期STATE（未入力の who + progress=0 など）や、再接続で同じSTATEが来た場合に
            // 何度も通知が出続けるのを避けるため、updatedAtで重複排除する。
            const ua = Number(s?.updatedAt ?? s?.updated_at);
            if (Number.isFinite(ua)) {
                if (lastNotifiedUpdatedAt === ua) {
                    screenLog('toast skip: duplicate updatedAt', ua);
                    return;
                }
                lastNotifiedUpdatedAt = ua;
            } else {
                screenLog('toast skip: no updatedAt', { sample: s });
                return;
            }

            enqueueNotification({ who: s?.who, message: s?.message, progress: p, updatedAt: ua });
        }

        const WS_BACKOFF_START_MS = 1000;
        const WS_BACKOFF_MAX_MS = 30000;
        let screenWs = null;
        let wsReconnectTimer = null;
        let wsBackoffMs = WS_BACKOFF_START_MS;
        let wsConnectGeneration = 0;

        function screenWsUrl() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            return `${proto}//${location.host}/ws`;
        }

        function scheduleWsReconnect() {
            if (wsReconnectTimer != null) return;
            const delay = wsBackoffMs;
            wsBackoffMs = Math.min(WS_BACKOFF_MAX_MS, wsBackoffMs * 2);
            wsReconnectTimer = window.setTimeout(() => {
                wsReconnectTimer = null;
                connectScreenWebSocket();
            }, delay);
            screenLog('WebSocket reconnect scheduled', { delayMs: delay, nextCapMs: WS_BACKOFF_MAX_MS });
        }

        function connectScreenWebSocket() {
            if (wsReconnectTimer != null) {
                clearTimeout(wsReconnectTimer);
                wsReconnectTimer = null;
            }

            const gen = ++wsConnectGeneration;

            if (screenWs) {
                try {
                    screenWs.close();
                } catch (_) {
                    /* ignore */
                }
                screenWs = null;
            }

            let ws;
            try {
                ws = new WebSocket(screenWsUrl());
            } catch (e) {
                console.warn('[sakurasake-screen] WebSocket constructor failed', e);
                scheduleWsReconnect();
                return;
            }

            screenWs = ws;

            ws.addEventListener('open', () => {
                if (gen !== wsConnectGeneration) return;
                screenLog('WebSocket open', { url: ws.url, readyState: ws.readyState });
                wsBackoffMs = WS_BACKOFF_START_MS;
            });

            ws.addEventListener('message', (ev) => {
                if (gen !== wsConnectGeneration) return;
                let s = null;
                try {
                    s = JSON.parse(ev.data);
                } catch (err) {
                    screenLog('WebSocket parse error', err, 'raw:', ev.data?.slice?.(0, 200));
                    return;
                }
                handleProgressPayload(s);
            });

            ws.addEventListener('close', () => {
                if (gen !== wsConnectGeneration) return;
                screenLog('WebSocket closed');
                screenWs = null;
                scheduleWsReconnect();
            });

            ws.addEventListener('error', (err) => {
                console.warn('[sakurasake-screen] WebSocket error', err);
            });
        }

        connectScreenWebSocket();

        // --- 7. アニメーションループ ---
        const clock = new THREE.Clock();
        // 重い場合は false にすると「回転/揺れ」を無効化できます（コードは残す）
        const ENABLE_TREE_ROTATION = false;
        const ENABLE_CAMERA_SWAY = false;

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();
            petalUniforms.uTime.value = elapsedTime;

            if (ENABLE_TREE_ROTATION) {
                // 木全体を非常にゆっくり回転させて、立体感を見せる
                treeRoot.rotation.y = Math.sin(elapsedTime * 0.05) * 0.3;
            }

            if (ENABLE_CAMERA_SWAY) {
                // カメラ自体も少し揺らす（手持ちカメラのような空気感）
                camera.position.x = Math.sin(elapsedTime * 0.1) * 3;
                camera.lookAt(0, 6, 0);
            }

            if (composer) {
                // Bloom有効時のみポストプロセス描画
                composer.render();
            } else {
                renderer.render(scene, camera);
            }
        }

        animate();

        // --- 8. ウィンドウリサイズ対応 ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            if (composer) composer.setSize(window.innerWidth, window.innerHeight);
            setRenderQuality(sakuraAmount);
        });
    </script>
</body>

</html>
