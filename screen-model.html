        const orbitEntries = [];
        const orbitEntryById = new Map();
        const orbitCardBatchPools = new Map();
        const orbitCardBatchMeshes = [];
        let _orbitSlotSerial = 0;
        const seenFeedIds = new Set();
        /** @type {Map<number, { pointLight: THREE.PointLight }>} */
        const postGlowById = new Map();
        const orbitTarget = new THREE.Vector3();
        const _treeWorldPos = new THREE.Vector3();
        const _treeToCam = new THREE.Vector3();
        const orbitRaycaster = new THREE.Raycaster();
        const orbitPointerNdc = new THREE.Vector2();
        const orbitCardMaxAnisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy?.() || 1);
        const orbitCardMaxTextureSize = renderer.capabilities.maxTextureSize || 8192;
        const ORBIT_CARD_WEBGL_Y = 0.38;
        const ORBIT_CARD_WEBGL_BASE_SCALE = 0.56;
        const ORBIT_CARD_BATCH_MAX_EDGE = Math.min(4096, orbitCardMaxTextureSize);
        const _orbitInstanceMatrix = new THREE.Matrix4();
        const _orbitInstancePosition = new THREE.Vector3();
        const _orbitInstanceQuaternion = new THREE.Quaternion();
        const _orbitInstanceScale = new THREE.Vector3();

        function likesToEmissiveIntensity(likes) {
            const L = Math.max(0, Number(likes) || 0);
            const t = L / (L + 10);
            return 0.06 + t * 1.28;
        }

        function roundedRect(ctx, x, y, w, h, r) {
            const rr = Math.max(0, Math.min(r, Math.min(w, h) / 2));
            ctx.beginPath();
            ctx.moveTo(x + rr, y);
            ctx.arcTo(x + w, y, x + w, y + h, rr);
            ctx.arcTo(x + w, y + h, x, y + h, rr);
            ctx.arcTo(x, y + h, x, y, rr);
            ctx.arcTo(x, y, x + w, y, rr);
            ctx.closePath();
        }

        function wrapTextLines(ctx, text, maxWidth) {
            const words = String(text ?? '').split(/\s+/).filter(Boolean);
            if (words.length === 0) return [''];
            const lines = [];
            let line = '';
            for (const w of words) {
                const next = line ? `${line} ${w}` : w;
                if (ctx.measureText(next).width <= maxWidth) {
                    line = next;
                    continue;
                }
                if (line) lines.push(line);
                // 1単語が長すぎる場合は強制分割
                if (ctx.measureText(w).width <= maxWidth) {
                    line = w;
                } else {
                    let chunk = '';
                    for (const ch of w) {
                        const c2 = chunk + ch;
                        if (ctx.measureText(c2).width <= maxWidth) {
                            chunk = c2;
                        } else {
                            if (chunk) lines.push(chunk);
                            chunk = ch;
                        }
                    }
                    line = chunk;
                }
            }
            if (line) lines.push(line);
            return lines;
        }

        /**
         * @param {{ w?: number, h?: number }} imgNatural
         */
        function orbitCardImageDisplayDims(imgNatural, contentW, maxH) {
            const nw = imgNatural?.w;
            const nh = imgNatural?.h;
            if (!nw || !nh || nw <= 0 || nh <= 0) {
                const drawH = Math.min(contentW * (9 / 16), maxH);
                return { drawW: contentW, drawH };
            }
            let drawW = contentW;
            let drawH = (drawW / nw) * nh;
            if (drawH > maxH) {
                drawH = maxH;
                drawW = (nw / nh) * drawH;
            }
            return { drawW, drawH };
        }

        /**
         * @param {object} item
         * @param {{ w: number, h: number } | null} imgNatural
         */
        function computeOrbitCardLayout(item, imgNatural = null) {
            const isComment = item.kind === 'comment';
            const showImg = item.kind === 'post' && typeof item.img === 'string' && item.img.trim().length > 0;
            const W = 1024;
            const padTop = 112;
            const padBottom = 44;
            const padX = 42;
            const contentW = W - padX * 2;

            const { title, subtitle } = buildToastContent({
                who: item.who,
                content: item.content,
                kind: item.kind,
                from: item.from,
            });

            const titleFontPx = isComment ? 44 : 48;
            const msgFontPx = 34;
            const approxCharWTitle = titleFontPx * 0.55;
            const approxCharWMsg = msgFontPx * 0.55;

            const titleMaxWidth = W - padX * 2 - 20;
            const msgMaxWidth = W - padX * 2;
            const titleCharsPerLine = Math.max(8, Math.floor(titleMaxWidth / approxCharWTitle));
            const msgCharsPerLine = Math.max(10, Math.floor(msgMaxWidth / approxCharWMsg));

            const titleLen = String(title ?? '').length;
            const msgLen = String(subtitle ?? '').length;
            const titleLines = Math.min(2, Math.max(1, Math.ceil(titleLen / titleCharsPerLine)));
            const msgLines = Math.min(3, Math.max(1, Math.ceil(msgLen / msgCharsPerLine)));

            let height = padTop;
            height += titleLines * 52;
            height += 10;
            height += msgLines * 44;
            if (showImg) {
                const dims = orbitCardImageDisplayDims(imgNatural, contentW, ORBIT_CARD_IMG_MAX_HEIGHT_PX);
                height += 12 + dims.drawH + 12;
            }
            height += 10;
            height += 2;
            height += 34;
            height += padBottom;

            const H = Math.max(
                ORBIT_CARD_MIN_HEIGHT_PX,
                Math.min(ORBIT_CARD_MAX_HEIGHT_PX, Math.round(height / 8) * 8),
            );

            const planeW = 7.2;
            const planeH = planeW * (H / W);

            return { W, H, planeW, planeH, padTop, padBottom, padX };
        }

        /**
         * @param {HTMLImageElement | null} loadedImg
         */
        function drawOrbitCardToCanvas(canvas, item, accent, isComment, loadedImg = null, hideText = false) {
            const ctx = canvas.getContext('2d');
            if (!ctx) return;
            const W = canvas.width;
            const H = canvas.height;
            const cardX = 16;
            const cardY = 16;
            const cardW = W - 32;
            const cardH = H - 32;
            const cardRadius = 38;
            ctx.clearRect(0, 0, W, H);

            // 背景（DOM版に寄せた淡いピンクのグラデ）
            const bg = ctx.createLinearGradient(0, 0, W, H);
            bg.addColorStop(0, '#fff9fc');
            bg.addColorStop(0.42, '#ffe9f2');
            bg.addColorStop(1, '#fff5f0');
            roundedRect(ctx, cardX, cardY, cardW, cardH, cardRadius);
            ctx.fillStyle = bg;
            ctx.fill();

            // 枠線
            ctx.lineWidth = 3;
            ctx.strokeStyle = 'rgba(255, 170, 190, 0.55)';
            ctx.stroke();

            // ほんのりアクセント
            const glow = ctx.createRadialGradient(120, H - 70, 10, 120, H - 70, 160);
            glow.addColorStop(0, 'rgba(255, 183, 197, 0.35)');
            glow.addColorStop(1, 'rgba(255, 183, 197, 0)');
            ctx.fillStyle = glow;
            ctx.fillRect(0, 0, W, H);

            // タイトル/本文
            const { title, subtitle } = buildToastContent({
                who: item.who,
                content: item.content,
                kind: item.kind,
                from: item.from,
            });
            const footer = giftNoteText(item.kind, item.who);

            const padX = 42;
            const padTop = 112;
            const padBottom = 44;
            const contentW = W - padX * 2;
            const showImg =
                item.kind === 'post' &&
                typeof item.img === 'string' &&
                item.img.trim().length > 0;
            let y = padTop;

            ctx.fillStyle = '#6b2d3f';
            ctx.font = isComment ? '800 44px system-ui, -apple-system, sans-serif' : '800 48px system-ui, -apple-system, sans-serif';
            const titleLines = wrapTextLines(ctx, title, W - padX * 2 - 20);
            for (const line of titleLines.slice(0, 2)) {
                if (!hideText) {
                    ctx.fillText(line, padX, y);
                }
                y += 52;
            }

            y += 10;
            ctx.fillStyle = '#5c3d48';
            ctx.font = '600 34px system-ui, -apple-system, sans-serif';
            const msgLines = wrapTextLines(ctx, subtitle || '', W - padX * 2);
            for (const line of msgLines.slice(0, 3)) {
                if (!hideText) {
                    ctx.fillText(line, padX, y);
                }
                y += 44;
            }

            if (showImg) {
                y += 12;
                const nw = loadedImg ? loadedImg.naturalWidth || loadedImg.width : 0;
                const nh = loadedImg ? loadedImg.naturalHeight || loadedImg.height : 0;
                const dims = orbitCardImageDisplayDims(
                    nw && nh ? { w: nw, h: nh } : null,
                    contentW,
                    ORBIT_CARD_IMG_MAX_HEIGHT_PX,
                );
                if (!hideText) {
                    const imgX = padX + (contentW - dims.drawW) / 2;
                    roundedRect(ctx, imgX, y, dims.drawW, dims.drawH, 22);
                    ctx.save();
                    ctx.clip();
                    ctx.fillStyle = 'rgba(255,255,255,0.35)';
                    ctx.fillRect(imgX, y, dims.drawW, dims.drawH);
                    if (loadedImg && nw > 0 && nh > 0) {
                        ctx.drawImage(loadedImg, imgX, y, dims.drawW, dims.drawH);
                    }
                    ctx.restore();
                    ctx.strokeStyle = 'rgba(255, 170, 190, 0.45)';
                    ctx.lineWidth = 2;
                    roundedRect(ctx, imgX, y, dims.drawW, dims.drawH, 22);
                    ctx.stroke();
                }
                y += dims.drawH + 12;
            }

            y += 10;
            ctx.strokeStyle = 'rgba(255, 170, 190, 0.35)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(padX, y);
            ctx.lineTo(W - padX, y);
            ctx.stroke();

            if (!hideText) {
                ctx.fillStyle = 'rgba(90, 52, 62, 0.75)';
                ctx.font = '700 22px system-ui, -apple-system, sans-serif';
                ctx.fillText(footer, padX, y + 34);
            }

            // 右上に桜
            ctx.fillStyle = 'rgba(255, 158, 196, 0.55)';
            ctx.font = '800 46px system-ui, -apple-system, sans-serif';
            ctx.fillText('🌸', W - 86, 74);

            // アクセント（外枠にほんのり）
            ctx.strokeStyle = accent;
            ctx.globalAlpha = 0.12;
            ctx.lineWidth = 10;
            roundedRect(ctx, 20, 20, W - 40, H - 40, 36);
            ctx.stroke();
            ctx.globalAlpha = 1;

            // 重なり時に矩形の透明帯が見えないよう、最終結果を角丸カード形状でマスクする。
            ctx.save();
            ctx.globalCompositeOperation = 'destination-in';
            roundedRect(ctx, cardX, cardY, cardW, cardH, cardRadius);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.restore();
        }

        function orbitCardLayoutKey(layout) {
            return `${layout.W}x${layout.H}:${layout.planeW.toFixed(4)}:${layout.planeH.toFixed(4)}`;
        }

        function createOrbitCardBatchMaterial(texture, layout, atlasWidth, atlasHeight) {
            const material = new THREE.MeshBasicMaterial({
                map: texture,
                transparent: true,
                opacity: 1,
                depthWrite: true,
                alphaTest: 0.02,
            });

            material.onBeforeCompile = (shader) => {
                shader.uniforms.orbitAtlasScale = {
                    value: new THREE.Vector2(
                        layout.W / atlasWidth,
                        layout.H / atlasHeight,
                    ),
                };

                shader.vertexShader = `
                    attribute vec2 instanceAtlasOffset;
                    attribute float instanceOpacity;
                    varying vec2 vOrbitAtlasUv;
                    varying float vOrbitInstanceOpacity;
                    uniform vec2 orbitAtlasScale;
                    ` + shader.vertexShader;
                shader.vertexShader = shader.vertexShader.replace(
                    '#include <uv_vertex>',
                    `#include <uv_vertex>
                    vOrbitAtlasUv = uv * orbitAtlasScale + instanceAtlasOffset;
                    vOrbitInstanceOpacity = instanceOpacity;`,
                );

                shader.fragmentShader = `
                    varying vec2 vOrbitAtlasUv;
                    varying float vOrbitInstanceOpacity;
                    ` + shader.fragmentShader;
                shader.fragmentShader = shader.fragmentShader.replace(
                    '#include <map_fragment>',
                    `#ifdef USE_MAP
                    vec4 sampledDiffuseColor = texture2D( map, vOrbitAtlasUv );
                    #ifdef DECODE_VIDEO_TEXTURE
                    sampledDiffuseColor = sRGBTransferEOTF( sampledDiffuseColor );
                    #endif
                    diffuseColor *= sampledDiffuseColor;
                    #endif
                    diffuseColor.rgb *= vOrbitInstanceOpacity;`,
                );
            };

            return material;
        }

        function getOrCreateOrbitCardBatchPool(layout) {
            const key = orbitCardLayoutKey(layout);
            let pool = orbitCardBatchPools.get(key);
            if (pool) return pool;

            pool = {
                key,
                layout,
                pages: [],
            };
            orbitCardBatchPools.set(key, pool);
            return pool;
        }

        function orbitCardBatchSlotX(page, slotIndex) {
            return (slotIndex % page.cols) * page.layout.W;
        }

        function orbitCardBatchSlotY(page, slotIndex) {
            return Math.floor(slotIndex / page.cols) * page.layout.H;
        }

        function setOrbitCardBatchSlotHidden(page, slotIndex) {
            _orbitInstancePosition.set(0, -999, 0);
            _orbitInstanceQuaternion.identity();
            _orbitInstanceScale.set(0, 0, 0);
            _orbitInstanceMatrix.compose(
                _orbitInstancePosition,
                _orbitInstanceQuaternion,
                _orbitInstanceScale,
            );
            page.mesh.setMatrixAt(slotIndex, _orbitInstanceMatrix);
            page.matrixDirty = true;
            if (page.opacityValues[slotIndex] !== 0) {
                page.opacityValues[slotIndex] = 0;
                page.opacityDirty = true;
            }
        }

        function createOrbitCardBatchPage(pool) {
            const { layout } = pool;
            const cols = Math.max(1, Math.floor(ORBIT_CARD_BATCH_MAX_EDGE / layout.W));
            const rows = Math.max(1, Math.floor(ORBIT_CARD_BATCH_MAX_EDGE / layout.H));
            const atlasWidth = Math.min(orbitCardMaxTextureSize, cols * layout.W);
            const atlasHeight = Math.min(orbitCardMaxTextureSize, rows * layout.H);
            const capacity = cols * rows;

            const atlasCanvas = document.createElement('canvas');
            atlasCanvas.width = atlasWidth;
            atlasCanvas.height = atlasHeight;
            const atlasCtx = atlasCanvas.getContext('2d');
            if (!atlasCtx) {
                throw new Error('2D context unavailable for orbit atlas');
            }

            const texture = new THREE.CanvasTexture(atlasCanvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            texture.anisotropy = orbitCardMaxAnisotropy;
            texture.generateMipmaps = false;
            texture.minFilter = THREE.LinearFilter;
            texture.magFilter = THREE.LinearFilter;
            texture.needsUpdate = true;

            const geometry = new THREE.PlaneGeometry(layout.planeW, layout.planeH, 1, 1);
            const atlasOffsetValues = new Float32Array(capacity * 2);
            const opacityValues = new Float32Array(capacity);
            const atlasOffsetAttribute = new THREE.InstancedBufferAttribute(atlasOffsetValues, 2);
            const opacityAttribute = new THREE.InstancedBufferAttribute(opacityValues, 1);
            atlasOffsetAttribute.setUsage(THREE.StaticDrawUsage);
            opacityAttribute.setUsage(THREE.DynamicDrawUsage);
            geometry.setAttribute('instanceAtlasOffset', atlasOffsetAttribute);
            geometry.setAttribute('instanceOpacity', opacityAttribute);

            for (let slotIndex = 0; slotIndex < capacity; slotIndex += 1) {
                const x = orbitCardBatchSlotX({ cols, layout }, slotIndex);
                const y = orbitCardBatchSlotY({ cols, layout }, slotIndex);
                atlasOffsetValues[slotIndex * 2] = x / atlasWidth;
                atlasOffsetValues[(slotIndex * 2) + 1] = 1 - ((y + layout.H) / atlasHeight);
            }

            const material = createOrbitCardBatchMaterial(texture, layout, atlasWidth, atlasHeight);
            const mesh = new THREE.InstancedMesh(geometry, material, capacity);
            mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
            mesh.count = capacity;
            mesh.frustumCulled = false;

            const page = {
                pool,
                layout,
                cols,
                rows,
                capacity,
                atlasWidth,
                atlasHeight,
                atlasCanvas,
                atlasCtx,
                texture,
                geometry,
                material,
                mesh,
                opacityAttribute,
                opacityValues,
                entryIds: Array(capacity).fill(null),
                freeSlots: Array.from({ length: capacity }, (_, i) => capacity - 1 - i),
                activeCount: 0,
                matrixDirty: false,
                opacityDirty: false,
            };

            mesh.userData.orbitCardBatchPage = page;
            for (let slotIndex = 0; slotIndex < capacity; slotIndex += 1) {
                setOrbitCardBatchSlotHidden(page, slotIndex);
            }
            mesh.instanceMatrix.needsUpdate = true;
            opacityAttribute.needsUpdate = true;

            pool.pages.push(page);
            orbitCardBatchMeshes.push(mesh);
            orbitRoot.add(mesh);
            return page;
        }

        function disposeOrbitCardBatchPage(page) {
            if (!page) return;
            const { pool } = page;
            const poolPageIndex = pool.pages.indexOf(page);
            if (poolPageIndex >= 0) pool.pages.splice(poolPageIndex, 1);
            const meshIndex = orbitCardBatchMeshes.indexOf(page.mesh);
            if (meshIndex >= 0) orbitCardBatchMeshes.splice(meshIndex, 1);
            orbitRoot.remove(page.mesh);
            try { page.geometry.dispose(); } catch { }
            try { page.material.dispose(); } catch { }
            try { page.texture.dispose(); } catch { }
            page.atlasCanvas.width = 1;
            page.atlasCanvas.height = 1;
            if (pool.pages.length === 0) {
                orbitCardBatchPools.delete(pool.key);
            }
        }

        function allocateOrbitCardBatchSlot(layout, entryId) {
            const pool = getOrCreateOrbitCardBatchPool(layout);
            let page = pool.pages.find((candidate) => candidate.freeSlots.length > 0) || null;
            if (!page) page = createOrbitCardBatchPage(pool);

            const slotIndex = page.freeSlots.pop();
            page.entryIds[slotIndex] = entryId;
            page.activeCount += 1;
            return { page, slotIndex };
        }

        function clearOrbitCardBatchSlot(page, slotIndex) {
            const x = orbitCardBatchSlotX(page, slotIndex);
            const y = orbitCardBatchSlotY(page, slotIndex);
            page.atlasCtx.clearRect(x, y, page.layout.W, page.layout.H);
            page.texture.needsUpdate = true;
        }

        function blitOrbitCardCanvasToAtlas(page, slotIndex, canvas) {
            const x = orbitCardBatchSlotX(page, slotIndex);
            const y = orbitCardBatchSlotY(page, slotIndex);
            page.atlasCtx.clearRect(x, y, page.layout.W, page.layout.H);
            page.atlasCtx.drawImage(canvas, x, y, page.layout.W, page.layout.H);
            page.texture.needsUpdate = true;
        }

        function redrawOrbitCardWebGL(webgl) {
            if (!webgl?.canvas) return;
            drawOrbitCardToCanvas(
                webgl.canvas,
                webgl.item,
                webgl.accent,
                webgl.isComment,
                webgl.loadedImg || null,
                webgl.textHidden,
            );
            if (webgl.page && webgl.slotIndex >= 0) {
                blitOrbitCardCanvasToAtlas(webgl.page, webgl.slotIndex, webgl.canvas);
            }
        }

        function updateOrbitCardWebGLTextState(webgl, behindNorm) {
            if (!ORBIT_HIDE_TEXT_WHEN_BEHIND || !webgl || webgl.disposed) return;
            const nextTextHidden = webgl.textHidden
                ? behindNorm > ORBIT_HIDE_TEXT_BEHIND_END
                : behindNorm >= ORBIT_HIDE_TEXT_BEHIND_START;
            if (nextTextHidden === webgl.textHidden) return;
            webgl.textHidden = nextTextHidden;
            redrawOrbitCardWebGL(webgl);
        }

        function detachOrbitCardWebGLSlot(webgl) {
            const page = webgl?.page;
            const slotIndex = webgl?.slotIndex;
            if (!page || !Number.isInteger(slotIndex) || slotIndex < 0) return;

            clearOrbitCardBatchSlot(page, slotIndex);
            setOrbitCardBatchSlotHidden(page, slotIndex);
            page.entryIds[slotIndex] = null;
            page.freeSlots.push(slotIndex);
            page.activeCount = Math.max(0, page.activeCount - 1);

            webgl.page = null;
            webgl.slotIndex = -1;

            if (page.activeCount === 0) {
                disposeOrbitCardBatchPage(page);
            }
        }

        function moveOrbitCardWebGLToLayout(webgl, nextLayout) {
            const currentKey = webgl.layout ? orbitCardLayoutKey(webgl.layout) : null;
            const nextKey = orbitCardLayoutKey(nextLayout);
            if (currentKey === nextKey) {
                webgl.layout = nextLayout;
                return;
            }

            detachOrbitCardWebGLSlot(webgl);
            const { page, slotIndex } = allocateOrbitCardBatchSlot(nextLayout, webgl.entryId);
            webgl.page = page;
            webgl.slotIndex = slotIndex;
            webgl.layout = nextLayout;
        }

        function disposeOrbitCardWebGL(webgl) {
            if (!webgl || webgl.disposed) return;
            webgl.disposed = true;
            detachOrbitCardWebGLSlot(webgl);
        }

        function updateOrbitCardWebGLInstance(entry, scale, opacity) {
            const webgl = entry?.webgl;
            const page = webgl?.page;
            const slotIndex = webgl?.slotIndex;
            if (!page || !Number.isInteger(slotIndex) || slotIndex < 0) return;

            _orbitInstancePosition.set(
                entry.group.position.x,
                entry.group.position.y + ORBIT_CARD_WEBGL_Y,
                entry.group.position.z,
            );
            _orbitInstanceQuaternion.copy(entry.group.quaternion);
            _orbitInstanceScale.set(scale, scale, scale);
            _orbitInstanceMatrix.compose(
                _orbitInstancePosition,
                _orbitInstanceQuaternion,
                _orbitInstanceScale,
            );
            page.mesh.setMatrixAt(slotIndex, _orbitInstanceMatrix);
            page.matrixDirty = true;

            if (page.opacityValues[slotIndex] !== opacity) {
                page.opacityValues[slotIndex] = opacity;
                page.opacityDirty = true;
            }

            webgl.scale = scale;
            webgl.opacity = opacity;
        }

        function flushOrbitCardBatchUpdates() {
            for (const mesh of orbitCardBatchMeshes) {
                const page = mesh.userData?.orbitCardBatchPage;
                if (!page) continue;
                if (page.matrixDirty) {
                    page.mesh.instanceMatrix.needsUpdate = true;
                    page.matrixDirty = false;
                }
                if (page.opacityDirty) {
                    page.opacityAttribute.needsUpdate = true;
                    page.opacityDirty = false;
                }
            }
        }

        function createOrbitCardWebGL(item, entryId) {
            const isComment = item.kind === 'comment';
            const accent = 'rgba(255, 158, 196, 0.45)';
            const canvas = document.createElement('canvas');
            const showImg = item.kind === 'post' && typeof item.img === 'string' && item.img.trim().length > 0;
            const layout = ORBIT_CARD_DYNAMIC_HEIGHT ? computeOrbitCardLayout(item) : { W: 1024, H: 448, planeW: 7.2, planeH: 3.15 };
            canvas.width = layout.W;
            canvas.height = layout.H;

            const { page, slotIndex } = allocateOrbitCardBatchSlot(layout, entryId);
            const webgl = {
                entryId,
                item,
                accent,
                isComment,
                page,
                slotIndex,
                layout,
                canvas,
                loadedImg: null,
                textHidden: false,
                scale: ORBIT_CARD_WEBGL_BASE_SCALE,
                opacity: 1,
                disposed: false,
            };
            redrawOrbitCardWebGL(webgl);

            if (showImg) {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                    if (webgl.disposed) return;
                    const nw = img.naturalWidth || img.width;
                    const nh = img.naturalHeight || img.height;
                    const newLayout = computeOrbitCardLayout(item, { w: nw, h: nh });
                    moveOrbitCardWebGLToLayout(webgl, newLayout);
                    webgl.loadedImg = img;
                    canvas.width = newLayout.W;
                    canvas.height = newLayout.H;
                    redrawOrbitCardWebGL(webgl);
                    const entry = orbitEntryById.get(entryId);
                    if (entry?.webgl === webgl) {
                        updateOrbitCardWebGLInstance(entry, webgl.scale, webgl.opacity);
                    }
                };
                img.onerror = () => { };
                img.src = item.img.trim();
            }

            return webgl;
        }

        /** 軌道上の見た目はカードのみ。投稿はいいね連動の PointLight を付与。 */
        function createOrbitAnchor(kind, likes) {
            const group = new THREE.Group();
            const isPost = kind === 'post';
            const li = isPost ? likesToEmissiveIntensity(likes) : 0.12;
            const pointLight = ORBIT_ENABLE_POST_POINT_LIGHTS
                ? new THREE.PointLight(0xff9ec4, isPost ? li * 2.2 : 0, 12)
                : null;
            if (pointLight) {
                pointLight.position.set(0, 0, 0);
                group.add(pointLight);
            }
            return { group, pointLight, isPost };
        }

        function applyPostGlow(postId, likes) {
            const rec = postGlowById.get(postId);
            if (!rec?.pointLight) return;
            const li = likesToEmissiveIntensity(likes);
            rec.pointLight.intensity = li * 2.2;
        }

        /**
         * @param {object} item
         * @returns {CSS2DObject}
         */
        function createOrbitMiniToast(item) {
            const payload = orbitItemToPayload(item);
            const { title, subtitle, who } = buildToastContent(payload);
            const footer = giftNoteText(item.kind, who);

            // CSS2DRenderer が element.style.transform を毎フレーム上書きするため、
            // スケールは「内側要素」に適用する（外側は renderer の位置合わせ用）。
            const outer = document.createElement('div');
            const inner = document.createElement('div');
            inner.className = 'orbit-toast-scale is-interactive';

            const card = document.createElement('div');
            card.className = 'orbit-toast-card is-clickable';
            if (item.kind === 'comment') card.classList.add('orbit-toast-card--comment');
            const itemId = Number(item.id);
            card.setAttribute('role', 'button');
            card.tabIndex = 0;
            card.setAttribute('aria-label', 'カードを前面表示');
            card.addEventListener('click', (event) => {
                event.stopPropagation();
                showPickedOrbitCard(payload);
            });
            card.addEventListener('keydown', (event) => {
                if (event.key !== 'Enter' && event.key !== ' ') return;
                event.preventDefault();
                showPickedOrbitCard(payload);
            });

            const whoEl = document.createElement('div');
            whoEl.className = 'orbit-toast-card__who';
            whoEl.textContent = title;

            const msgEl = document.createElement('div');
            msgEl.className = 'orbit-toast-card__msg';
            msgEl.textContent = subtitle;

            card.appendChild(whoEl);
            card.appendChild(msgEl);

            const showImg =
                item.kind === 'post' &&
                typeof item.img === 'string' &&
                item.img.trim().length > 0;
            if (showImg) {
                const wrap = document.createElement('div');
                wrap.className = 'orbit-toast-card__img-wrap is-visible';
                const img = document.createElement('img');
                img.className = 'orbit-toast-card__img';
                img.alt = '';
                img.src = item.img.trim();
                img.onerror = () => {
                    wrap.classList.remove('is-visible');
                    img.removeAttribute('src');
                };
                wrap.appendChild(img);
                card.appendChild(wrap);
            }

            const giftEl = document.createElement('div');
            giftEl.className = 'orbit-toast-card__gift';
            giftEl.textContent = footer;
            card.appendChild(giftEl);

            inner.appendChild(card);
            outer.appendChild(inner);
            const label = new CSS2DObject(outer);
            label.position.set(0, 0.38, 0);
            return label;
        }

        function assignOrbitParamsForEntry(entry) {
            const seed = hashString(String(entry.id));
            const index = orbitEntries.indexOf(entry);
            if (index < 0) return;

            if (ORBIT_USE_GOLDEN_SPREAD) {
                const slot = entry.orbitSlot ?? index;
                const goldenAngle = Math.PI * (3 - Math.sqrt(5));
                const t = Math.min(1, (slot + 1) / ORBIT_MAX);
                const radiusJitter = ((seed >> 3) % 24) / 100;
                const radiusRaw = ORBIT_BASE_RADIUS - 1.2 + 4.2 * Math.sqrt(t) + radiusJitter;
                const radius = radiusRaw * ORBIT_SPREAD_XZ_SCALE;
                const baseAngle = slot * goldenAngle + ((seed % 37) / 37) * 0.22;
                const heightBottom = 1.15;
                const heightTopRaw = ORBIT_RING_HEIGHT_TOP + 0.35;
                const heightTop = heightBottom + (heightTopRaw - heightBottom) * ORBIT_SPREAD_Y_SCALE;
                const height = THREE.MathUtils.lerp(heightTop, heightBottom, t) + ((seed >> 1) % 9) * 0.05;
                entry.orbit = {
                    centerX: 0,
                    radius,
                    height,
                    speed: 0.055 + (seed % 11) * 0.0012,
                    baseAngle,
                    index: slot,
                };
            } else {
                const n = orbitEntries.length;
                const ringIndex = Math.floor(index / ORBIT_ITEMS_PER_RING);
                const ringStart = ringIndex * ORBIT_ITEMS_PER_RING;
                const itemsInRing = Math.min(ORBIT_ITEMS_PER_RING, Math.max(n - ringStart, 0));
                const slotIndex = index - ringStart;
                const slotAngle = itemsInRing > 0 ? (slotIndex / itemsInRing) * Math.PI * 2 : 0;
                const ringOffset = ringIndex % 2 === 0 ? 0 : Math.PI / Math.max(itemsInRing, 1);
                const ringHeight = ORBIT_RING_HEIGHT_TOP - ringIndex * ORBIT_RING_GAP;
                const radius = ORBIT_BASE_RADIUS + ringIndex * ORBIT_RING_RADIUS_STEP;
                entry.orbit = {
                    centerX: 0,
                    radius,
                    height: Math.max(0.75, ringHeight),
                    speed: 0.082 - ringIndex * 0.004 + (seed % 7) * 0.0015,
                    baseAngle: slotAngle + ringOffset,
                    index,
                };
            }
        }

        function addOrbitItem(item) {
            const id = Number(item.id);
            if (!Number.isFinite(id) || seenFeedIds.has(id)) return;
            if (orbitEntries.length >= ORBIT_MAX) {
                const old = orbitEntries.shift();
                if (old) {
                    seenFeedIds.delete(old.id);
                    orbitEntryById.delete(old.id);
                    orbitRoot.remove(old.group);
                    if (old.webgl) {
                        disposeOrbitCardWebGL(old.webgl);
                    }
                    if (old.isPost) postGlowById.delete(old.id);
                }
            }
            seenFeedIds.add(id);
            const likes = item.kind === 'post' ? Number(item.likes ?? 0) : 0;
            const { group, pointLight, isPost } = createOrbitAnchor(item.kind, likes);
            const label = ORBIT_RENDER_MODE === 'dom' ? createOrbitMiniToast(item) : null;
            if (label) group.add(label);
            const payload = orbitItemToPayload(item);
            const entry = {
                id,
                kind: item.kind,
                payload,
                group,
                pointLight,
                isPost,
                orbit: null,
                orbitSlot: _orbitSlotSerial++,
                label,
                webgl: null,
            };
            orbitEntries.push(entry);
            orbitEntryById.set(id, entry);
            if (isPost && pointLight) postGlowById.set(id, { pointLight });
            orbitRoot.add(group);
            assignOrbitParamsForEntry(entry);
            if (ORBIT_RENDER_MODE === 'webgl') {
                entry.webgl = createOrbitCardWebGL(item, id);
            }
        }

        const _orbitWorldPos = new THREE.Vector3();
        const _orbitCamLocal = new THREE.Vector3();
        const _treeCamLocal = new THREE.Vector3();
        let _orbitFrame = 0;

        function updateOrbitPositions(elapsedTime) {
            _orbitFrame += 1;
            camera.updateMatrixWorld();
            _treeCamLocal.set(0, treeRoot.position.y + 5, 0)
                .applyMatrix4(camera.matrixWorldInverse);
            const treeCamDepth = -_treeCamLocal.z;
            let sharedYaw = 0;
            if (ORBIT_USE_TREE_CAMERA_YAW) {
                treeRoot.getWorldPosition(_treeWorldPos);
                _treeToCam.copy(camera.position).sub(_treeWorldPos);
                _treeToCam.y = 0;
                sharedYaw = Math.atan2(_treeToCam.x, _treeToCam.z);
            }

            for (const entry of orbitEntries) {
                const o = entry.orbit;
                if (!o) continue;

                const orbitAngle = o.baseAngle + elapsedTime * o.speed;
                const yWobble = Math.sin(elapsedTime * 0.72 + o.index) * 0.04;
                entry.group.position.set(
                    o.centerX + Math.cos(orbitAngle) * o.radius,
                    o.height + yWobble,
                    Math.sin(orbitAngle) * o.radius,
                );

                if (ORBIT_USE_TREE_CAMERA_YAW) {
                    entry.group.rotation.set(0, sharedYaw, 0);
                } else {
                    orbitTarget.copy(camera.position);
                    const dx = orbitTarget.x - entry.group.position.x;
                    const dz = orbitTarget.z - entry.group.position.z;
                    entry.group.rotation.set(0, Math.atan2(dx, dz), 0);
                }

                let shouldRefreshCardState = true;
                if (ORBIT_ENABLE_LOD) {
                    const dx = camera.position.x - (orbitRoot.position.x + entry.group.position.x);
                    const dy = camera.position.y - (orbitRoot.position.y + entry.group.position.y);
                    const dz = camera.position.z - (orbitRoot.position.z + entry.group.position.z);
                    const distanceSq = dx * dx + dy * dy + dz * dz;
                    shouldRefreshCardState = !(
                        distanceSq > ORBIT_FAR_DISTANCE_SQ &&
                        _orbitFrame % ORBIT_FAR_UPDATE_EVERY_N_FRAMES !== 0
                    );
                }

                let opac = entry.webgl?.opacity ?? 1;
                let webglScale = entry.webgl?.scale ?? ORBIT_CARD_WEBGL_BASE_SCALE;

                if (shouldRefreshCardState) {
                    _orbitWorldPos.set(
                        orbitRoot.position.x + entry.group.position.x,
                        orbitRoot.position.y + entry.group.position.y,
                        orbitRoot.position.z + entry.group.position.z,
                    );
                    _orbitCamLocal.copy(_orbitWorldPos).applyMatrix4(camera.matrixWorldInverse);

                    const depthFromCam = -_orbitCamLocal.z;
                    const behindAmount = Math.max(0, depthFromCam - treeCamDepth);
                    const behindNorm = Math.min(1, behindAmount / 10);
                    opac = 1 - behindNorm * ORBIT_BEHIND_DIM_STRENGTH;
                    if (ORBIT_RENDER_MODE === 'webgl' && entry.webgl) {
                        updateOrbitCardWebGLTextState(entry.webgl, behindNorm);
                    }

                    if (ORBIT_RENDER_MODE === 'dom' && entry.label) {
                        const outer = entry.label.element;
                        const inner = outer?.firstElementChild;
                        const baseScale = ORBIT_CARD_BASE_SCALE;
                        const sc = baseScale * (1 - behindNorm * 0.4);
                        outer.style.opacity = String(opac);
                        if (inner) inner.style.transform = `scale(${sc.toFixed(3)})`;
                        outer.style.zIndex = String(Math.round(1000 + _orbitCamLocal.z * 10));
                    }
                    if (ORBIT_RENDER_MODE === 'webgl' && entry.webgl) {
                        webglScale = ORBIT_CARD_WEBGL_BASE_SCALE * (1 - behindNorm * 0.35);
                    }
                }

                if (ORBIT_RENDER_MODE === 'webgl' && entry.webgl) {
                    updateOrbitCardWebGLInstance(entry, webglScale, opac);
                }
            }

            if (ORBIT_RENDER_MODE === 'webgl') {
                flushOrbitCardBatchUpdates();
            }
        }

        function upsertOrbitFromPayload(p) {
            const rawId = p.feedItemId ?? p.feed_item_id;
            if (rawId == null) return;
            addOrbitItem({
                id: rawId,
                kind: p.kind,
                who: p.who,
                from: p.from,
                content: p.content,
                img: p.img,
                likes: 0,
                createdAt: new Date().toISOString(),
            });
        }

        async function loadInitialFeedSnapshot() {
            if (STATIC_FEED_SNAPSHOT) return STATIC_FEED_SNAPSHOT;
            const r = await fetch('/feed?limit=100');
            if (!r.ok) return null;
            return r.json();
        }

        async function loadFeed() {
            try {
                const data = await loadInitialFeedSnapshot();
                if (!data) return;
                if (typeof data?.totalCount === 'number') {
                    setBlossomTotalCount(data.totalCount);
                }
                const rows = (data.items || []).slice().sort((a, b) => {
                    const ta = Date.parse(a.createdAt || a.created_at || 0) || 0;
                    const tb = Date.parse(b.createdAt || b.created_at || 0) || 0;
                    return ta - tb;
                });
                for (const it of rows) {
                    const idNum = Number(it.id);
                    if (Number.isFinite(idNum)) countedFeedIds.add(idNum);
                    addOrbitItem({
                        id: it.id,
                        kind: it.kind,
                        who: it.who,
                        from: it.from,
                        content: it.content,
                        img: it.img,
                        likes: it.likes,
                        createdAt: it.createdAt || it.created_at,
                    });
                }
                // totalCount が無い（旧サーバ等）場合は、取得件数を暫定の累計として扱う
                if (typeof data?.totalCount !== 'number') {
                    setBlossomTotalCount(Math.max(blossomTotalCount, rows.length));
                }
            } catch (e) {
                console.warn('[sakurasake-screen] feed load failed', e);
            }
        }

        // --- 6.5 WebSocket（スマホ更新をスクリーンへ反映） ---
        const toastOverlayEl = document.getElementById('toastOverlay');
        const toastCardEl = document.getElementById('toastCard');
        const toastWhoEl = document.getElementById('toastWho');
        const toastMessageEl = document.getElementById('toastMessage');
        const toastGiftNoteEl = document.getElementById('toastGiftNote');
        const toastImgWrapEl = document.getElementById('toastImgWrap');
        const toastImgEl = document.getElementById('toastImg');

        // 既定でコンソールに出す。うるさいときは URL に ?screenDebug=0 か localStorage sakurasakeScreenDebug=0
        const _screenDebugParam = new URLSearchParams(location.search).get('screenDebug');
        const _ls =
            typeof localStorage !== 'undefined' ? localStorage.getItem('sakurasakeScreenDebug') : null;
        const SCREEN_DEBUG =
            _screenDebugParam === '0' || _ls === '0'
                ? false
                : _screenDebugParam === '1' || _ls === '1' || _screenDebugParam === null;
        const screenLog = (...args) => {
            if (SCREEN_DEBUG) console.log('[sakurasake-screen]', ...args);
        };

        const notifyQueue = [];
        let isToastShowing = false;
        let lastNotifiedUpdatedAt = null;
        let activeToastMode = null;
        let toastHideTimer = null;
        let toastExitTimer = null;

        function clearToastTimers() {
            if (toastHideTimer != null) {
                window.clearTimeout(toastHideTimer);
                toastHideTimer = null;
            }
            if (toastExitTimer != null) {
                window.clearTimeout(toastExitTimer);
                toastExitTimer = null;
            }
        }

        function showToastNow(payload, options = {}) {
            if (!toastOverlayEl || !toastWhoEl || !toastMessageEl) {
                screenLog('showToastNow: DOM missing', {
                    toastOverlayEl: !!toastOverlayEl,
                    toastWhoEl: !!toastWhoEl,
                    toastMessageEl: !!toastMessageEl,
                });
                return;
            }
            const { title, subtitle, who } = buildToastContent(payload);
            const kind = payload?.kind;
            const interactive = options?.interactive === true;

            if (toastCardEl) {
                toastCardEl.classList.toggle('toast-kind-comment', kind === 'comment');
            }

            toastWhoEl.textContent = title;
            toastMessageEl.textContent = subtitle;
            if (toastGiftNoteEl) toastGiftNoteEl.textContent = giftNoteText(kind, who);

            const showImg =
                (kind === 'like' || kind === 'post') &&
                typeof payload?.img === 'string' &&
                payload.img.trim().length > 0;
            if (toastImgWrapEl && toastImgEl) {
                if (showImg) {
                    toastImgWrapEl.classList.add('is-visible');
                    toastImgWrapEl.setAttribute('aria-hidden', 'false');
                    toastImgEl.onerror = () => {
                        toastImgWrapEl.classList.remove('is-visible');
                        toastImgWrapEl.setAttribute('aria-hidden', 'true');
                        toastImgEl.removeAttribute('src');
                    };
                    toastImgEl.alt = '';
                    toastImgEl.src = payload.img.trim();
                } else {
                    toastImgWrapEl.classList.remove('is-visible');
                    toastImgWrapEl.setAttribute('aria-hidden', 'true');
                    toastImgEl.removeAttribute('src');
                }
            }

            toastOverlayEl.classList.toggle('is-interactive', interactive);
            toastOverlayEl.setAttribute('aria-hidden', 'false');
            toastOverlayEl.classList.add('is-visible');
            screenLog('toast visible', { title, subtitle, kind });
        }

        function hideToastNow() {
            if (!toastOverlayEl) return;
            toastOverlayEl.classList.remove('is-visible');
            toastOverlayEl.classList.remove('is-interactive');
            toastOverlayEl.setAttribute('aria-hidden', 'true');
        }

        function normalizeOrbitEntryId(entryId) {
            if (entryId == null) return null;
            const id = Number(entryId);
            return Number.isFinite(id) ? id : null;
        }

        function findOrbitEntryById(entryId) {
            const id = normalizeOrbitEntryId(entryId);
            if (id == null) return null;
            return orbitEntryById.get(id) || null;
        }

        function pickOrbitEntryAt(clientX, clientY) {
            if (ORBIT_RENDER_MODE !== 'webgl') return null;
            const canvasEl = renderer?.domElement;
            if (!canvasEl) return null;
            const rect = canvasEl.getBoundingClientRect();
            if (rect.width <= 0 || rect.height <= 0) return null;

            orbitPointerNdc.set(
                ((clientX - rect.left) / rect.width) * 2 - 1,
                -((clientY - rect.top) / rect.height) * 2 + 1,
            );
            orbitRaycaster.setFromCamera(orbitPointerNdc, camera);

            if (orbitCardBatchMeshes.length === 0) return null;

            const hit = orbitRaycaster.intersectObjects(orbitCardBatchMeshes, false)[0];
            const page = hit?.object?.userData?.orbitCardBatchPage;
            const slotIndex = hit?.instanceId;
            if (!page || !Number.isInteger(slotIndex)) return null;
            return findOrbitEntryById(page.entryIds[slotIndex]);
        }

        function finishToast(mode) {
            toastExitTimer = window.setTimeout(() => {
                toastExitTimer = null;
                if (activeToastMode !== mode) return;
                activeToastMode = null;
                isToastShowing = false;
                pumpQueue();
            }, 260);
        }

        function showPickedOrbitCard(payload) {
            clearToastTimers();
            activeToastMode = 'manual';
            isToastShowing = true;
            showToastNow(payload, { interactive: true });
        }

        function closePickedOrbitCard() {
            if (activeToastMode !== 'manual') return;
            clearToastTimers();
            hideToastNow();
            finishToast('manual');
        }

        function pumpQueue() {
            if (isToastShowing) return;
            const next = notifyQueue.shift();
            if (!next) return;
            isToastShowing = true;
            activeToastMode = 'queue';

            screenLog('pumpQueue: show', { queueLeft: notifyQueue.length, payload: next });
            showToastNow(next, { interactive: false });
            toastHideTimer = window.setTimeout(() => {
                toastHideTimer = null;
                hideToastNow();
                // フェードアウトの遷移を待ってから次へ
                finishToast('queue');
            }, 5000);
        }

        function enqueueNotification(payload) {
            notifyQueue.push(payload);
            screenLog('enqueueNotification', { queueLen: notifyQueue.length, payload });
            pumpQueue();
        }

        if (toastOverlayEl) {
            toastOverlayEl.addEventListener('click', () => {
                closePickedOrbitCard();
            });
        }
        if (toastCardEl) {
            toastCardEl.addEventListener('click', (event) => {
                event.stopPropagation();
            });
        }
        window.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') closePickedOrbitCard();
        });
        if (renderer?.domElement) {
            renderer.domElement.addEventListener('click', (event) => {
                if (toastOverlayEl?.classList.contains('is-interactive')) return;
                const entry = pickOrbitEntryAt(event.clientX, event.clientY);
                if (!entry?.payload) return;
                showPickedOrbitCard(entry.payload);
            });
        }

        function handleProgressPayload(s) {
            if (!s || typeof s !== 'object') return;

            const tp = s.targetPostId ?? s.target_post_id;
            const pl = s.postLikes ?? s.post_likes;
            if (tp != null && pl != null) {
                applyPostGlow(Number(tp), Number(pl));
            }

            if (s.kind === 'post' || s.kind === 'comment') {
                const rawId = s.feedItemId ?? s.feed_item_id;
                const idNum = Number(rawId);
                if (Number.isFinite(idNum) && !countedFeedIds.has(idNum)) {
                    countedFeedIds.add(idNum);
                    setBlossomTotalCount(blossomTotalCount + 1);
                }
                upsertOrbitFromPayload(s);
            }

            const cStr = contentText(s);
            screenLog('state payload', {
                content: cStr,
                kind: s?.kind,
                who: s?.who,
                from: s?.from,
                img: s?.img,
                updatedAt: s?.updatedAt,
                keys: Object.keys(s),
            });

            const ua = Number(s?.updatedAt ?? s?.updated_at);
            if (!s?.kind) {
                if (Number.isFinite(ua)) lastNotifiedUpdatedAt = ua;
                screenLog('toast skip: no kind');
                return;
            }

            if (Number.isFinite(ua)) {
                if (lastNotifiedUpdatedAt === ua) {
                    screenLog('toast skip: duplicate updatedAt', ua);
                    return;
                }
                lastNotifiedUpdatedAt = ua;
            } else {
                screenLog('toast skip: no updatedAt', { sample: s });
                return;
            }

            enqueueNotification({
                who: s?.who,
                content: s?.content,
                kind: s?.kind,
                img: s?.img,
                from: s?.from,
                updatedAt: ua,
            });
        }

        const WS_BACKOFF_START_MS = 1000;
        const WS_BACKOFF_MAX_MS = 30000;
        let screenWs = null;
        let wsReconnectTimer = null;
        let wsBackoffMs = WS_BACKOFF_START_MS;
        let wsConnectGeneration = 0;

        function screenWsUrl() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            return `${proto}//${location.host}/ws`;
        }

        function scheduleWsReconnect() {
            if (wsReconnectTimer != null) return;
            const delay = wsBackoffMs;
            wsBackoffMs = Math.min(WS_BACKOFF_MAX_MS, wsBackoffMs * 2);
            wsReconnectTimer = window.setTimeout(() => {
                wsReconnectTimer = null;
                connectScreenWebSocket();
            }, delay);
            screenLog('WebSocket reconnect scheduled', { delayMs: delay, nextCapMs: WS_BACKOFF_MAX_MS });
        }

        function connectScreenWebSocket() {
            if (wsReconnectTimer != null) {
                clearTimeout(wsReconnectTimer);
                wsReconnectTimer = null;
            }

            const gen = ++wsConnectGeneration;

            if (screenWs) {
                try {
                    screenWs.close();
                } catch (_) {
                    /* ignore */
                }
                screenWs = null;
            }

            let ws;
            try {
                ws = new WebSocket(screenWsUrl());
            } catch (e) {
                console.warn('[sakurasake-screen] WebSocket constructor failed', e);
                scheduleWsReconnect();
                return;
            }

            screenWs = ws;

            ws.addEventListener('open', () => {
                if (gen !== wsConnectGeneration) return;
                screenLog('WebSocket open', { url: ws.url, readyState: ws.readyState });
                wsBackoffMs = WS_BACKOFF_START_MS;
            });

            ws.addEventListener('message', (ev) => {
                if (gen !== wsConnectGeneration) return;
                let s = null;
                try {
                    s = JSON.parse(ev.data);
                } catch (err) {
                    screenLog('WebSocket parse error', err, 'raw:', ev.data?.slice?.(0, 200));
                    return;
                }
                handleProgressPayload(s);
            });

            ws.addEventListener('close', () => {
                if (gen !== wsConnectGeneration) return;
                screenLog('WebSocket closed');
                screenWs = null;
                scheduleWsReconnect();
            });

            ws.addEventListener('error', (err) => {
                console.warn('[sakurasake-screen] WebSocket error', err);
            });
        }

        loadFeed().finally(() => {
            if (STATIC_LIVE_UPDATES_ENABLED) connectScreenWebSocket();
        });

        // --- 7. アニメーションループ ---
        const clock = new THREE.Clock();
        // 重い場合は false にすると「回転/揺れ」を無効化できます（コードは残す）
        const ENABLE_TREE_ROTATION = false;
        const ENABLE_CAMERA_SWAY = false;
        const SCROLL_BLOCK_KEYS = new Set([
            ' ',
            'Spacebar',
            'ArrowUp',
            'ArrowDown',
            'PageUp',
            'PageDown',
            'Home',
            'End',
        ]);

        function preventMeaninglessScroll(event) {
            event.preventDefault();
        }

        function handleWindowKeydown(event) {
            if (!SCROLL_BLOCK_KEYS.has(event.key)) return;
            event.preventDefault();
        }

        window.addEventListener('keydown', handleWindowKeydown, { passive: false });
        window.addEventListener('wheel', preventMeaninglessScroll, { passive: false });
        window.addEventListener('touchmove', preventMeaninglessScroll, { passive: false });

        function animate() {
            requestAnimationFrame(animate);
            const deltaTime = clock.getDelta();
            const elapsedTime = clock.elapsedTime;
            petalUniforms.uTime.value = elapsedTime;

            if (ENABLE_TREE_ROTATION) {
                // 木全体を非常にゆっくり回転させて、立体感を見せる
                treeRoot.rotation.y = Math.sin(elapsedTime * 0.05) * 0.3;
            }

            if (ENABLE_CAMERA_SWAY) {
                // カメラ自体も少し揺らす（手持ちカメラのような空気感）
                camera.position.x = Math.sin(elapsedTime * 0.1) * 3;
                camera.lookAt(0, 6, 0);
            }

            updateOrbitPositions(elapsedTime);
            updateTreeRunners(elapsedTime, deltaTime);

            if (composer) {
                composer.render();
            } else {
                renderer.render(scene, camera);
            }
            renderWeatherRain(deltaTime);
            if (labelRenderer) labelRenderer.render(scene, camera);
        }

        animate();

        // --- 8. ウィンドウリサイズ対応 ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            resizeWeatherRainCanvas();
            if (composer) composer.setSize(window.innerWidth, window.innerHeight);
            if (labelRenderer) labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
