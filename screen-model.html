<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早稲田の桜</title>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: none;
            position: relative;
            --weather-rain-opacity: 0.58;
            --weather-cloud-opacity: 0.52;
            --weather-sun-opacity: 0;
            --weather-sunbeams-opacity: 0;
            --weather-backdrop-brightness: 0.76;
            --weather-backdrop-saturate: 0.82;
            --weather-sky-top: #050b13;
            --weather-sky-mid: #1a2735;
            --weather-sky-bottom: #30343b;
            --weather-sky-haze: rgba(126, 148, 180, 0.18);
            --weather-sky-glow: rgba(134, 157, 191, 0.12);
            background: linear-gradient(180deg, #060814 0%, #241726 46%, #10060d 100%);
            color: #fff;
        }

        canvas {
            display: block;
            position: relative;
            z-index: 1;
        }

        #ambienceBackdrop {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
            filter: brightness(var(--weather-backdrop-brightness)) saturate(var(--weather-backdrop-saturate));
            transition: filter 900ms ease;
            background:
                radial-gradient(circle at 80% 18%, var(--weather-sky-glow) 0%, rgba(255, 230, 180, 0) 34%),
                radial-gradient(circle at 50% 22%, var(--weather-sky-haze) 0%, rgba(205, 222, 246, 0) 52%),
                linear-gradient(180deg, var(--weather-sky-top) 0%, var(--weather-sky-mid) 48%, var(--weather-sky-bottom) 100%);
        }

        .ambience-layer {
            position: absolute;
            inset: -8%;
            opacity: 0;
            will-change: opacity, transform;
            transition: opacity 900ms ease, transform 1200ms ease;
        }

        #ambienceSun {
            background:
                radial-gradient(circle at 82% 18%, rgba(255, 248, 217, 0.95) 0%, rgba(255, 230, 177, 0.72) 8%, rgba(255, 214, 152, 0.24) 18%, rgba(255, 214, 152, 0) 38%);
            opacity: var(--weather-sun-opacity);
            mix-blend-mode: screen;
            filter: blur(1px);
        }

        #ambienceSunbeams {
            background:
                linear-gradient(156deg, transparent 0%, rgba(255, 239, 195, 0.14) 44%, transparent 60%),
                linear-gradient(146deg, transparent 0%, rgba(255, 228, 176, 0.12) 42%, transparent 58%),
                linear-gradient(168deg, transparent 0%, rgba(255, 247, 220, 0.1) 40%, transparent 55%),
                radial-gradient(circle at 82% 18%, rgba(255, 234, 189, 0.28) 0%, rgba(255, 234, 189, 0) 42%);
            opacity: var(--weather-sunbeams-opacity);
            mix-blend-mode: screen;
            animation: sunPulse 10s ease-in-out infinite alternate;
        }

        #ambienceClouds {
            background:
                radial-gradient(ellipse at 16% 18%, rgba(217, 228, 246, 0.52) 0%, rgba(217, 228, 246, 0.22) 22%, rgba(217, 228, 246, 0) 46%),
                radial-gradient(ellipse at 44% 12%, rgba(192, 206, 231, 0.44) 0%, rgba(192, 206, 231, 0.18) 22%, rgba(192, 206, 231, 0) 42%),
                radial-gradient(ellipse at 72% 18%, rgba(207, 220, 242, 0.46) 0%, rgba(207, 220, 242, 0.16) 24%, rgba(207, 220, 242, 0) 45%),
                radial-gradient(ellipse at 88% 10%, rgba(170, 187, 213, 0.34) 0%, rgba(170, 187, 213, 0.1) 22%, rgba(170, 187, 213, 0) 42%),
                linear-gradient(180deg, rgba(40, 55, 74, 0.32) 0%, rgba(40, 55, 74, 0.08) 44%, rgba(40, 55, 74, 0) 72%);
            opacity: var(--weather-cloud-opacity);
            mix-blend-mode: screen;
            animation: cloudDrift 42s linear infinite alternate;
        }

        #weatherRainCanvas {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 2;
            opacity: var(--weather-rain-opacity);
            transition: opacity 500ms ease;
        }

        #ambienceGlow {
            background:
                radial-gradient(circle at 50% 16%, rgba(255, 222, 181, 0.28) 0%, rgba(255, 222, 181, 0) 44%),
                radial-gradient(circle at 20% 30%, rgba(255, 179, 209, 0.18) 0%, rgba(255, 179, 209, 0) 34%),
                radial-gradient(circle at 80% 22%, rgba(157, 184, 255, 0.12) 0%, rgba(157, 184, 255, 0) 32%);
            animation: ambienceFloat 18s ease-in-out infinite alternate;
        }

        #ambienceBloom {
            background:
                radial-gradient(circle at 50% 72%, rgba(255, 196, 216, 0.24) 0%, rgba(255, 196, 216, 0) 46%),
                radial-gradient(circle at 16% 58%, rgba(255, 215, 154, 0.14) 0%, rgba(255, 215, 154, 0) 30%),
                radial-gradient(circle at 84% 54%, rgba(255, 231, 205, 0.16) 0%, rgba(255, 231, 205, 0) 28%);
            animation: ambienceFloat 22s ease-in-out infinite alternate-reverse;
        }

        #ambienceSparkle {
            background:
                radial-gradient(circle at 12% 24%, rgba(255, 249, 233, 0.9) 0 2px, transparent 6px),
                radial-gradient(circle at 24% 40%, rgba(255, 225, 240, 0.72) 0 2px, transparent 6px),
                radial-gradient(circle at 38% 18%, rgba(255, 246, 229, 0.78) 0 1.5px, transparent 5px),
                radial-gradient(circle at 52% 28%, rgba(255, 252, 247, 0.9) 0 2px, transparent 6px),
                radial-gradient(circle at 66% 14%, rgba(255, 226, 241, 0.72) 0 2px, transparent 5px),
                radial-gradient(circle at 78% 34%, rgba(255, 248, 234, 0.84) 0 2px, transparent 6px),
                radial-gradient(circle at 88% 20%, rgba(255, 252, 247, 0.95) 0 2px, transparent 6px),
                radial-gradient(circle at 18% 12%, rgba(255, 234, 246, 0.66) 0 1.5px, transparent 5px);
            animation: ambienceDrift 24s linear infinite;
        }

        #ambiencePetalMist {
            background:
                radial-gradient(ellipse at 28% 54%, rgba(255, 221, 233, 0.22) 0%, rgba(255, 221, 233, 0) 44%),
                radial-gradient(ellipse at 72% 46%, rgba(255, 233, 243, 0.18) 0%, rgba(255, 233, 243, 0) 42%);
            animation: ambienceFloat 20s ease-in-out infinite alternate;
        }

        body[data-ambience-stage="0"] #ambienceGlow {
            opacity: 0.14;
        }

        body[data-ambience-stage="1"] #ambienceGlow {
            opacity: 0.28;
        }

        body[data-ambience-stage="2"] #ambienceGlow {
            opacity: 0.42;
        }

        body[data-ambience-stage="3"] #ambienceGlow,
        body[data-ambience-stage="4"] #ambienceGlow {
            opacity: 0.54;
        }

        body[data-ambience-stage="2"] #ambienceBloom {
            opacity: 0.24;
        }

        body[data-ambience-stage="3"] #ambienceBloom {
            opacity: 0.38;
        }

        body[data-ambience-stage="4"] #ambienceBloom {
            opacity: 0.5;
        }

        body[data-ambience-stage="3"] #ambienceSparkle {
            opacity: 0.24;
        }

        body[data-ambience-stage="4"] #ambienceSparkle {
            opacity: 0.42;
        }

        body[data-ambience-stage="3"] #ambiencePetalMist {
            opacity: 0.14;
        }

        body[data-ambience-stage="4"] #ambiencePetalMist {
            opacity: 0.28;
        }

        body.ambience-background-disabled #ambienceGlow,
        body.ambience-background-disabled #ambienceBloom,
        body.ambience-background-disabled #ambiencePetalMist {
            display: none;
        }

        body.ambience-sparkles-disabled #ambienceSparkle {
            display: none;
        }

        body.ambience-weather-disabled #ambienceSun,
        body.ambience-weather-disabled #ambienceSunbeams,
        body.ambience-weather-disabled #ambienceClouds,
        body.ambience-weather-disabled #weatherRainCanvas {
            display: none;
        }

        @keyframes ambienceFloat {
            from {
                transform: translate3d(0, 0, 0) scale(1);
            }

            to {
                transform: translate3d(0, -2.5%, 0) scale(1.03);
            }
        }

        @keyframes ambienceDrift {
            from {
                transform: translate3d(-1.5%, 0, 0);
            }

            to {
                transform: translate3d(1.5%, -2%, 0);
            }
        }

        @keyframes cloudDrift {
            from {
                transform: translate3d(-2.5%, 0, 0) scale(1);
            }

            to {
                transform: translate3d(2.5%, -1.5%, 0) scale(1.03);
            }
        }

        @keyframes sunPulse {
            from {
                transform: scale(0.99);
            }

            to {
                transform: scale(1.03);
            }
        }

        #ui {
            position: absolute;
            z-index: 10;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            width: min(720px, calc(100vw - 24px));
            padding: 10px 12px;
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.28);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
            color: rgba(255, 255, 255, 0.86);
            font-family: sans-serif;
            pointer-events: none;
            user-select: none;
            text-align: center;
            font-size: 13px;
            letter-spacing: 0.02em;
            opacity: 0.92;
            transition: background 500ms ease, border-color 500ms ease, box-shadow 500ms ease, opacity 500ms ease;
        }

        body[data-ambience-stage="3"] #ui,
        body[data-ambience-stage="4"] #ui {
            background: rgba(24, 16, 26, 0.26);
            border-color: rgba(255, 231, 240, 0.26);
            box-shadow: 0 14px 36px rgba(18, 8, 16, 0.4);
        }

        /* 軌道用ミニトースト（#toastCard のレイアウトを縮小） */
        .orbit-toast-scale {
            transform-origin: 50% 100%;
            pointer-events: none;
            transition: opacity 120ms linear;
        }

        .orbit-toast-scale.is-interactive {
            pointer-events: auto;
        }

        .orbit-toast-card {
            position: relative;
            overflow: hidden;
            width: min(760px, calc(100vw - 24px));
            max-width: 520px;
            border-radius: 22px 26px 24px 22px;
            background: linear-gradient(165deg, #fff9fc 0%, #ffe9f2 42%, #fff5f0 100%);
            border: 1px solid rgba(255, 170, 190, 0.55);
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.85) inset,
                0 18px 48px rgba(170, 80, 100, 0.18),
                0 8px 28px rgba(0, 0, 0, 0.1);
            color: #4a3038;
            font-family: sans-serif;
            padding: 56px 22px 18px;
            text-align: left;
        }

        .orbit-toast-card::before {
            content: none;
            display: none;
        }

        .orbit-toast-card::after {
            content: '';
            position: absolute;
            width: 140px;
            height: 140px;
            bottom: -48px;
            left: -36px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 183, 197, 0.35) 0%, transparent 68%);
            pointer-events: none;
        }

        .orbit-toast-card--comment .orbit-toast-card__who {
            font-size: 22px;
            line-height: 1.28;
        }

        .orbit-toast-card .orbit-toast-card__who {
            padding-right: 8px;
        }

        .orbit-toast-card__who {
            position: relative;
            z-index: 1;
            padding-right: 40px;
            font-weight: 800;
            font-size: 26px;
            letter-spacing: 0.02em;
            line-height: 1.1;
            margin-bottom: 10px;
            color: #6b2d3f;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        .orbit-toast-card__msg {
            position: relative;
            z-index: 1;
            font-size: 18px;
            line-height: 1.55;
            letter-spacing: 0.01em;
            color: #5c3d48;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.45);
            overflow-wrap: anywhere;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .orbit-toast-card__img-wrap {
            display: none;
            position: relative;
            z-index: 1;
            margin: 12px 0 4px;
            width: 100%;
            max-width: 100%;
            border-radius: 14px;
            border: 1px solid rgba(255, 170, 190, 0.45);
            background: rgba(255, 255, 255, 0.35);
            padding: 4px;
            box-sizing: border-box;
        }

        .orbit-toast-card__img-wrap.is-visible {
            display: block;
        }

        .orbit-toast-card__img {
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 100%;
            height: auto;
            max-height: 360px;
            object-fit: contain;
            border-radius: 10px;
            vertical-align: middle;
        }

        .orbit-toast-card__gift {
            position: relative;
            z-index: 1;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 170, 190, 0.35);
            font-size: 14px;
            line-height: 1.45;
            letter-spacing: 0.04em;
            color: rgba(90, 52, 62, 0.72);
        }

        /* --- 進捗通知オーバーレイ（中央表示） --- */
        #toastOverlay {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            padding: 18px;
            /* WebGL canvas が body 末尾に追加されると手前に描画されやすいので最前面に固定 */
            z-index: 10000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 220ms ease;
            background: radial-gradient(900px 520px at 50% 46%, rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.75));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        #toastOverlay.is-visible {
            opacity: 1;
        }

        #toastOverlay.is-interactive {
            pointer-events: auto;
            cursor: zoom-out;
        }

        #toastCard {
            position: relative;
            overflow: hidden;
            width: min(760px, calc(100vw - 24px));
            border-radius: 22px 26px 24px 22px;
            background: linear-gradient(165deg, #fff9fc 0%, #ffe9f2 42%, #fff5f0 100%);
            border: 1px solid rgba(255, 170, 190, 0.55);
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.85) inset,
                0 18px 48px rgba(170, 80, 100, 0.18),
                0 8px 28px rgba(0, 0, 0, 0.1);
            color: #4a3038;
            font-family: sans-serif;
            padding: 20px 22px 18px;
            transform: translateY(10px) scale(0.99);
            opacity: 0;
            transition: transform 220ms ease, opacity 220ms ease;
        }

        #toastCard::before {
            content: '🌸';
            position: absolute;
            top: 10px;
            right: 14px;
            font-size: 22px;
            line-height: 1;
            opacity: 0.5;
            pointer-events: none;
            filter: drop-shadow(0 1px 2px rgba(255, 200, 210, 0.8));
        }

        #toastCard::after {
            content: '';
            position: absolute;
            width: 140px;
            height: 140px;
            bottom: -48px;
            left: -36px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 183, 197, 0.35) 0%, transparent 68%);
            pointer-events: none;
        }

        #toastOverlay.is-visible #toastCard {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        #toastWho {
            position: relative;
            z-index: 1;
            padding-right: 40px;
            font-weight: 800;
            font-size: 26px;
            letter-spacing: 0.02em;
            line-height: 1.1;
            margin-bottom: 10px;
            color: #6b2d3f;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        #toastMessage {
            position: relative;
            z-index: 1;
            font-size: 18px;
            line-height: 1.55;
            letter-spacing: 0.01em;
            color: #5c3d48;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.45);
            overflow-wrap: anywhere;
            word-break: break-word;
            white-space: pre-wrap;
        }

        #toastImgWrap {
            display: none;
            position: relative;
            z-index: 1;
            margin: 12px 0 4px;
            width: 100%;
            max-width: 100%;
            border-radius: 14px;
            border: 1px solid rgba(255, 170, 190, 0.45);
            background: rgba(255, 255, 255, 0.35);
            padding: 4px;
            box-sizing: border-box;
        }

        #toastImgWrap.is-visible {
            display: block;
        }

        #toastImg {
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 100%;
            height: auto;
            max-height: 360px;
            object-fit: contain;
            border-radius: 10px;
            vertical-align: middle;
        }

        #toastGiftNote {
            position: relative;
            z-index: 1;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 170, 190, 0.35);
            font-size: 14px;
            line-height: 1.45;
            letter-spacing: 0.04em;
            color: rgba(90, 52, 62, 0.72);
        }

        #toastCard.toast-kind-comment #toastWho {
            font-size: 22px;
            line-height: 1.28;
        }

        @media (max-width: 520px) {
            #toastWho {
                font-size: 22px;
            }

            #toastCard.toast-kind-comment #toastWho {
                font-size: 19px;
            }

            #toastMessage {
                font-size: 16px;
            }

            #toastGiftNote {
                font-size: 13px;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            .ambience-layer {
                animation: none !important;
                transition: opacity 400ms ease !important;
            }

            #weatherRainCanvas {
                display: none;
            }

            #toastOverlay,
            #toastCard {
                transition: none !important;
            }
        }
    </style>
</head>

<body>
    <div id="ambienceBackdrop" aria-hidden="true">
        <div id="ambienceSun" class="ambience-layer"></div>
        <div id="ambienceSunbeams" class="ambience-layer"></div>
        <div id="ambienceClouds" class="ambience-layer"></div>
        <div id="ambienceGlow" class="ambience-layer"></div>
        <div id="ambienceBloom" class="ambience-layer"></div>
        <div id="ambienceSparkle" class="ambience-layer"></div>
        <div id="ambiencePetalMist" class="ambience-layer"></div>
    </div>
    <canvas id="weatherRainCanvas" aria-hidden="true"></canvas>
    <div id="ui">投稿・コメントが桜となり木の周りを回ります。</div>
    <div id="toastOverlay" aria-hidden="true">
        <div id="toastCard">
            <div id="toastWho"></div>
            <div id="toastMessage"></div>
            <div id="toastImgWrap" aria-hidden="true">
                <img id="toastImg" alt="" />
            </div>
            <div id="toastGiftNote" aria-live="polite"></div>
        </div>
    </div>

    <!-- Three.js のインポート -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
</script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { CSS2DObject, CSS2DRenderer } from 'three/addons/renderers/CSS2DRenderer.js';

        const STATIC_EXPORT_BOOTSTRAP =
            typeof window !== 'undefined' &&
                window.__SAKURASAKE_STATIC_EXPORT__ &&
                typeof window.__SAKURASAKE_STATIC_EXPORT__ === 'object'
                ? window.__SAKURASAKE_STATIC_EXPORT__
                : null;
        const STATIC_FEED_SNAPSHOT =
            STATIC_EXPORT_BOOTSTRAP &&
                STATIC_EXPORT_BOOTSTRAP.feed &&
                typeof STATIC_EXPORT_BOOTSTRAP.feed === 'object'
                ? STATIC_EXPORT_BOOTSTRAP.feed
                : null;
        const STATIC_TREE_RUNNERS_MANIFEST =
            STATIC_EXPORT_BOOTSTRAP &&
                STATIC_EXPORT_BOOTSTRAP.modelsManifest &&
                typeof STATIC_EXPORT_BOOTSTRAP.modelsManifest === 'object'
                ? STATIC_EXPORT_BOOTSTRAP.modelsManifest
                : null;
        const STATIC_LIVE_UPDATES_ENABLED = STATIC_EXPORT_BOOTSTRAP?.staticExport !== true;
        const STATIC_ORBIT_MAX = (() => {
            const n = Number(STATIC_EXPORT_BOOTSTRAP?.orbitMax);
            return Number.isFinite(n) ? Math.max(1, Math.trunc(n)) : null;
        })();

        // 桜の木の形を固定するためのシード（毎回同じ枝ぶり・花のばらつきになる）
        // URL: ?treeSeed=12345 で変更可。未指定時は 42。
        const TREE_SEED = (() => {
            const q = new URLSearchParams(location.search).get('treeSeed');
            if (q != null && q !== '') {
                const n = Number(q);
                if (Number.isFinite(n)) return Math.trunc(n);
            }
            return 1234;
        })();

        /** @param {number} seed */
        function mulberry32(seed) {
            let a = seed >>> 0;
            return function random01() {
                let t = (a = (a + 0x6d2b79f5) >>> 0);
                t = Math.imul(t ^ (t >>> 15), t | 1);
                t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            };
        }

        const treeRng = mulberry32(TREE_SEED ^ 0x9e3779b9);
        const petalRng = mulberry32((TREE_SEED + 0x13579bdf) >>> 0);

        /** @param {string} value */
        function hashString(value) {
            let hash = 0;
            for (let i = 0; i < value.length; i += 1) {
                hash = (hash << 5) - hash + value.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash);
        }

        const EMPTY_SUBTITLE_LIKE_POST = '（メッセージはありません）';

        function contentText(payload) {
            const raw = payload?.content;
            if (raw == null || raw === '') return '';
            if (typeof raw === 'number' && Number.isFinite(raw)) return String(raw);
            return String(raw).trim();
        }

        function buildCommentTitle(fromT, whoT) {
            if (fromT && whoT) return `「${fromT}」から「${whoT}」へコメントがあった！`;
            if (fromT) return `「${fromT}」からコメントがあった！`;
            if (whoT) return `「${whoT}」へコメントがあった！`;
            return 'コメントがあった！';
        }

        function buildToastContent(payload) {
            const who = (payload?.who ?? '').toString().trim();
            const kind = payload?.kind;
            const text = contentText(payload);
            const displayWho = who || 'だれか';

            if (kind === 'comment') {
                const fromT = (payload?.from ?? '').toString().trim();
                return {
                    title: buildCommentTitle(fromT, who),
                    subtitle: text || '（本文なし）',
                    who,
                };
            }

            if (kind === 'post') {
                return {
                    title: `${displayWho}が投稿した！`,
                    subtitle: text || EMPTY_SUBTITLE_LIKE_POST,
                    who,
                };
            }

            return {

        function lerpNumber(a, b, t) {
            return a + (b - a) * clamp01(t);
        }

        function lerpColorHex(fromHex, toHex, t) {
            const from = new THREE.Color(fromHex);
            const to = new THREE.Color(toHex);
            return from.lerp(to, clamp01(t));
        }

        function colorToCss(color) {
            return color.getStyle();

        function lerpRgbaArray(from, to, t) {
            return [
                lerpNumber(from[0], to[0], t),
                lerpNumber(from[1], to[1], t),
                lerpNumber(from[2], to[2], t),
                lerpNumber(from[3], to[3], t),
            ];
        }

        function rgbaArrayToCss(parts) {
            return `rgba(${Math.round(parts[0])}, ${Math.round(parts[1])}, ${Math.round(parts[2])}, ${parts[3].toFixed(3)})`;
        }

        function resolveAmbienceStage(percent01) {
            const p = clamp01(percent01);
            for (let i = AMBIENCE_STAGE_THRESHOLDS.length - 1; i >= 0; i -= 1) {
                if (p >= AMBIENCE_STAGE_THRESHOLDS[i]) return i + 1;
            }
            return 0;
        }

        function materializeAmbiencePreset(preset) {
            return {
                ambientColor: new THREE.Color(preset.ambientColor),
                ambientIntensity: preset.ambientIntensity,
                sunColor: new THREE.Color(preset.sunColor),
                sunIntensity: preset.sunIntensity,
                fogColor: new THREE.Color(preset.fogColor),
                fogDensity: preset.fogDensity,
                petalCount: preset.petalCount,
            };
        }

        function sampleAmbiencePreset(percent01) {
            const p = clamp01(percent01);
            if (p <= AMBIENCE_PRESETS[0].at) {
                return materializeAmbiencePreset(AMBIENCE_PRESETS[0]);
            }
            for (let i = 1; i < AMBIENCE_PRESETS.length; i += 1) {
                const prev = AMBIENCE_PRESETS[i - 1];
                const next = AMBIENCE_PRESETS[i];
                if (p <= next.at) {
                    const t = (p - prev.at) / Math.max(0.0001, next.at - prev.at);
                    return {
                        ambientColor: lerpColorHex(prev.ambientColor, next.ambientColor, t),
                        ambientIntensity: lerpNumber(prev.ambientIntensity, next.ambientIntensity, t),
                        sunColor: lerpColorHex(prev.sunColor, next.sunColor, t),
                        sunIntensity: lerpNumber(prev.sunIntensity, next.sunIntensity, t),
                        fogColor: lerpColorHex(prev.fogColor, next.fogColor, t),
                        fogDensity: lerpNumber(prev.fogDensity, next.fogDensity, t),
                        petalCount: Math.round(lerpNumber(prev.petalCount, next.petalCount, t)),

            const last = AMBIENCE_PRESETS[AMBIENCE_PRESETS.length - 1];
            return materializeAmbiencePreset(last);

        function weatherRainDropCount() {
            const areaBased = Math.round((weatherRainWidth * weatherRainHeight) / 18000);
            return Math.min(WEATHER_RAIN_MAX_DROPS, Math.max(52, areaBased));
        }

        function resetWeatherRainDrop(drop, withinViewport) {
            const speedY = 620 + Math.random() * 420;
            const slant = 0.12 + Math.random() * 0.06;
            const length = 9 + Math.random() * 12;
            drop.x = Math.random() * (weatherRainWidth + 140) - 70;
            drop.y = withinViewport
                ? Math.random() * weatherRainHeight
                : -length - Math.random() * (weatherRainHeight * 0.35 + 120);
            drop.speedY = speedY;
            drop.speedX = speedY * slant;
            drop.length = length;
            drop.tailX = length * slant;
            drop.alpha = 0.16 + Math.random() * 0.26;
            drop.outerWidth = 1.0 + Math.random() * 0.45;
            drop.innerWidth = 0.5 + Math.random() * 0.24;
        }

        function rebuildWeatherRainDrops() {
            if (!weatherRainCtx) return;
            weatherRainDrops.length = 0;
            const count = weatherRainDropCount();
            for (let i = 0; i < count; i += 1) {
                const drop = {};
                resetWeatherRainDrop(drop, true);
                weatherRainDrops.push(drop);
            }
        }

        function resizeWeatherRainCanvas() {
            if (!weatherRainCanvas || !weatherRainCtx) return;
            weatherRainWidth = window.innerWidth;
            weatherRainHeight = window.innerHeight;
            const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
            weatherRainCanvas.width = Math.round(weatherRainWidth * dpr);
            weatherRainCanvas.height = Math.round(weatherRainHeight * dpr);
            weatherRainCanvas.style.width = `${weatherRainWidth}px`;
            weatherRainCanvas.style.height = `${weatherRainHeight}px`;
            weatherRainCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
            weatherRainCtx.clearRect(0, 0, weatherRainWidth, weatherRainHeight);
            rebuildWeatherRainDrops();
            weatherRainNeedsClear = false;
        }

        function renderWeatherRain(deltaSeconds) {
            if (!weatherRainCtx) return;
            const activeCount = Math.round(weatherRainDrops.length * weatherRainIntensity);
            if (activeCount <= 0) {
                if (weatherRainNeedsClear) {
                    weatherRainCtx.clearRect(0, 0, weatherRainWidth, weatherRainHeight);
                    weatherRainNeedsClear = false;
                }
                return;
            }

            const dt = Math.min(0.05, Math.max(0.001, deltaSeconds || 0.016));
            weatherRainCtx.clearRect(0, 0, weatherRainWidth, weatherRainHeight);
            weatherRainCtx.lineCap = 'round';
            weatherRainNeedsClear = true;

            for (let i = 0; i < activeCount; i += 1) {
                const drop = weatherRainDrops[i];
                drop.x += drop.speedX * dt;
                drop.y += drop.speedY * dt;

                if (drop.y - drop.length > weatherRainHeight || drop.x - drop.tailX > weatherRainWidth + 40) {
                    resetWeatherRainDrop(drop, false);
                }

                const x0 = drop.x - drop.tailX;
                const y0 = drop.y - drop.length;

                weatherRainCtx.strokeStyle = `rgba(150, 176, 214, ${(drop.alpha * 0.42).toFixed(3)})`;
                weatherRainCtx.lineWidth = drop.outerWidth;
                weatherRainCtx.beginPath();
                weatherRainCtx.moveTo(x0, y0);
                weatherRainCtx.lineTo(drop.x, drop.y);
                weatherRainCtx.stroke();

                weatherRainCtx.strokeStyle = `rgba(237, 244, 255, ${(drop.alpha * 0.82).toFixed(3)})`;
                weatherRainCtx.lineWidth = drop.innerWidth;
                weatherRainCtx.beginPath();
                weatherRainCtx.moveTo(x0, y0);
                weatherRainCtx.lineTo(drop.x, drop.y);
                weatherRainCtx.stroke();
            }
        }

        const flowerMeshes = [];
        const FLOWER_DENSITY = 0.55; // 数を減らす（見た目はスケールで補償）

        function createBranch(parent, length, width, depth) {
            // 末端の枝分けを1段削る（最後の分岐レベルなし）
            const maxDepth = 6;
            if (depth > maxDepth) return;

            // 枝の作成
            const branchGeo = new THREE.CylinderGeometry(width * 0.65, width, length, 4);
            // 原点を枝の底面にするためにジオメトリを移動
            branchGeo.translate(0, length / 2, 0);
            const branchMesh = new THREE.Mesh(branchGeo, trunkMaterial);
            parent.add(branchMesh);

            // 枝の先端（花を咲かせる、または次の枝を伸ばす位置）
            const tipPosition = new THREE.Vector3(0, length, 0);

            // 先端付近に花を咲かせる（表示数はスライダーで制御）
            if (depth >= maxDepth - 2) {
                const flowersCount = depth === maxDepth ? 4 : (depth === maxDepth - 1 ? 2 : 1);
                for (let i = 0; i < flowersCount; i++) {
                    const flowerGroup = new THREE.Group();
                    for (let j = 0; j < 5; j++) {
                        const petal = new THREE.Mesh(petalGeometry, petalMaterial);
                        petal.rotation.z = (Math.PI * 2 / 5) * j;
                        petal.rotation.x = 0.2;
                        flowerGroup.add(petal);
                    }

                    flowerGroup.position.copy(tipPosition);
                    flowerGroup.position.x += (treeRng() - 0.5) * 2.0;
                    flowerGroup.position.y += (treeRng() - 0.5) * 2.0;
                    flowerGroup.position.z += (treeRng() - 0.5) * 2.0;
                    flowerGroup.rotation.set(
                        treeRng() * Math.PI,
                        treeRng() * Math.PI,
                        treeRng() * Math.PI
                    );

                    const scale = 0.5 + treeRng() * 0.5;
                    flowerGroup.scale.set(scale, scale, scale);
                    flowerGroup.userData.baseScale = scale;
                    flowerGroup.visible = false;

                    branchMesh.add(flowerGroup);
                    flowerMeshes.push(flowerGroup);
                }
            }

            // 次の枝を生やす
            if (depth < maxDepth) {
                // 枝の分岐数を制御（先に行くほど2本になりやすくし、処理落ちを防ぐ）
                const numBranches = (depth === 0) ? 3 : (depth > 4 ? 2 : (treeRng() > 0.3 ? 2 : 3));

                for (let i = 0; i < numBranches; i++) {
                    const nextBranchGroup = new THREE.Group();
                    nextBranchGroup.position.copy(tipPosition);

                    // 枝の広がり角度（上の方ほど横に広がりやすくする）
                    const angleX = (treeRng() - 0.5) * (1.0 + depth * 0.15);
                    const angleZ = (treeRng() - 0.5) * (1.0 + depth * 0.15);
                    nextBranchGroup.rotation.set(angleX, 0, angleZ);

                    // 木全体が横にふんわり広がるようにY軸も回転
                    nextBranchGroup.rotation.y = treeRng() * Math.PI * 2;

                    branchMesh.add(nextBranchGroup);

                    // 再帰呼び出し（長さと太さを少しずつ小さくする）
                    createBranch(nextBranchGroup, length * (0.75 + treeRng() * 0.1), width * 0.65, depth + 1);
                }
            }
        }

        // 【New】木の生成開始（初期の長さを5.5、太さを1.4にして立派な大木に）
        createBranch(treeRoot, 5.5, 1.4, 0);
        // 木全体のY座標を下げて、画面中央に収まりやすくする
        treeRoot.position.y = -10;

        // カメラを引いて、大きな木全体を捉える
        camera.position.set(0, 10, 32);
        camera.lookAt(0, 6, 0);

        const gltfLoader = new GLTFLoader();
        const treeRunnersRoot = new THREE.Group();
        scene.add(treeRunnersRoot);

        const _treeRunnerBox = new THREE.Box3();
        const _treeRunnerSize = new THREE.Vector3();
        const _treeRunnerCenter = new THREE.Vector3();
        const treeRunnerState = {
            loading: false,
            loaded: false,
            attempted: false,
            orbitAngle: 0,
            orbitTotalAngle: 0,
            entries: [],
            batches: [],
            slotEntries: [],
            activeBatchIndex: 0,
            incomingBatchIndex: -1,
            completedLaps: 0,
            transitionActive: false,
            slotTransitions: [],
        };

        function setTreeRunnersVisible(nextVisible) {
            const visible = Boolean(nextVisible && treeRunnerState.loaded);
            for (let i = 0; i < treeRunnerState.entries.length; i++) {
                const entry = treeRunnerState.entries[i];
                entry.root.visible = false;
            }

            if (!visible) return;

            for (let i = 0; i < treeRunnerState.slotEntries.length; i++) {
                const entry = treeRunnerState.slotEntries[i];
                if (entry?.loaded) {
                    entry.root.visible = true;
                }
            }

            if (!treeRunnerState.transitionActive) return;

            for (let i = 0; i < treeRunnerState.slotTransitions.length; i++) {
                const transition = treeRunnerState.slotTransitions[i];
                if (!transition || transition.done) continue;
                if (transition.incomingEntry?.loaded) {
                    transition.incomingEntry.root.visible = true;
                }
            }
        }

        function createTreeRunnerBatches(entries) {
            const batches = [];
            const fullBatchCount =
                Math.floor(entries.length / TREE_RUNNERS_BATCH_SIZE) * TREE_RUNNERS_BATCH_SIZE;
            for (let i = 0; i < fullBatchCount; i += TREE_RUNNERS_BATCH_SIZE) {
                batches.push(entries.slice(i, i + TREE_RUNNERS_BATCH_SIZE));
            }

            if (!batches.length && entries.length) {
                batches.push(entries.slice(0, Math.min(entries.length, TREE_RUNNERS_BATCH_SIZE)));
            }

            return batches;
        }

        function setTreeRunnerBatchSlots(batchIndex) {
            const batch = treeRunnerState.batches[batchIndex] || [];
            treeRunnerState.slotEntries = batch.slice();
        }

        function finishTreeRunnerBatchTransition() {
            treeRunnerState.activeBatchIndex = treeRunnerState.incomingBatchIndex;
            treeRunnerState.incomingBatchIndex = -1;
            treeRunnerState.transitionActive = false;
            treeRunnerState.completedLaps = 0;
            treeRunnerState.slotTransitions = [];
            setTreeRunnerBatchSlots(treeRunnerState.activeBatchIndex);
            setTreeRunnersVisible(ENABLE_TREE_RUNNERS);
        }

        function startTreeRunnerBatchTransition() {
            if (treeRunnerState.batches.length < 2 || treeRunnerState.transitionActive) return;
            treeRunnerState.incomingBatchIndex =
                (treeRunnerState.activeBatchIndex + 1) % treeRunnerState.batches.length;
            treeRunnerState.transitionActive = true;
            treeRunnerState.slotTransitions = new Array(treeRunnerState.slotEntries.length).fill(null);
        }

        function normalizeAngle(angle) {
            const tau = Math.PI * 2;
            return ((angle % tau) + tau) % tau;
        }

        function angleDeltaFromHiddenZoneCenter(angle) {
            return Math.atan2(
                Math.sin(angle - TREE_RUNNERS_HIDE_ZONE_CENTER),
                Math.cos(angle - TREE_RUNNERS_HIDE_ZONE_CENTER)
            );
        }

        function isAngleInHiddenZone(angle) {
            return Math.abs(angleDeltaFromHiddenZoneCenter(angle)) <= TREE_RUNNERS_HIDE_ZONE_HALF_WIDTH;
        }

        function isAngleInTransitionZone(angle) {
            return (
                Math.abs(angleDeltaFromHiddenZoneCenter(angle)) <=
                TREE_RUNNERS_TRANSITION_ZONE_HALF_WIDTH
            );
        }

        function easeInOut(t) {
            const x = clamp01(t);
            return 0.5 - Math.cos(x * Math.PI) * 0.5;
        }

        function applyTreeRunnerTransform(entry, angle, elapsedTime, slotIndex, options = {}) {
            if (!entry?.loaded) return;

            const angleWithOffset = angle + (options.angleOffset || 0);
            const radius = TREE_RUNNERS_RADIUS + (options.radiusOffset || 0);
            const x = Math.cos(angleWithOffset) * radius;
            const z = Math.sin(angleWithOffset) * radius;
            const tangentX = -Math.sin(angleWithOffset);
            const tangentZ = Math.cos(angleWithOffset);
            const stridePhase =
                elapsedTime * TREE_RUNNERS_BOUNCE_SPEED -
                slotIndex * TREE_RUNNERS_PHASE_STEP +
                (options.phaseOffset || 0);
            const bounce = Math.abs(Math.sin(stridePhase)) * TREE_RUNNERS_BOUNCE_HEIGHT;
            const scaleMul = Number.isFinite(options.scaleMul) ? options.scaleMul : 1;

            entry.root.position.set(
                x,
                treeRoot.position.y + TREE_RUNNERS_GROUND_OFFSET + (options.rootYOffset || 0),
                z
            );
            entry.root.rotation.y =
                Math.atan2(tangentX, tangentZ) +
                TREE_RUNNERS_YAW_OFFSET +
                (options.yawOffset || 0);
            entry.visual.position.y = bounce + (options.visualYOffset || 0);
            entry.visual.rotation.x =
                -TREE_RUNNERS_LEAN +
                Math.sin(stridePhase * 2) * 0.04 +
                (options.pitchOffset || 0);
            entry.visual.rotation.z =
                Math.sin(stridePhase) * TREE_RUNNERS_ROLL +
                (options.rollOffset || 0);
            entry.visual.scale.setScalar(scaleMul);
        }

        function startTreeRunnerSlotTransition(slotIndex) {
            if (!treeRunnerState.transitionActive || treeRunnerState.incomingBatchIndex < 0) return;
            if (treeRunnerState.slotTransitions[slotIndex]) return;

            const incomingBatch = treeRunnerState.batches[treeRunnerState.incomingBatchIndex] || [];
            const incomingEntry = incomingBatch[slotIndex] || null;
            if (!incomingEntry?.loaded) return;

            treeRunnerState.slotTransitions[slotIndex] = {
                incomingEntry,
                progress: 0,
                done: false,
            };

            setTreeRunnersVisible(ENABLE_TREE_RUNNERS);
        }

        function updateTreeRunnerBatchTransition(angleGap) {
            if (!treeRunnerState.transitionActive || treeRunnerState.incomingBatchIndex < 0) return;

            const slotCount = treeRunnerState.slotEntries.length;
            if (!slotCount) {
                finishTreeRunnerBatchTransition();
                return;
            }

            let completedCount = 0;
            for (let i = 0; i < slotCount; i++) {
                let transition = treeRunnerState.slotTransitions[i];
                const slotAngle = normalizeAngle(treeRunnerState.orbitAngle - i * angleGap);
                const zoneDelta = angleDeltaFromHiddenZoneCenter(slotAngle);

                if (!transition && isAngleInTransitionZone(slotAngle) && zoneDelta <= 0) {
                    startTreeRunnerSlotTransition(i);
                    transition = treeRunnerState.slotTransitions[i];
                }

                if (!transition) continue;

                if (!transition.done) {
                    const rawProgress =
                        (zoneDelta + TREE_RUNNERS_TRANSITION_ZONE_HALF_WIDTH) /
                        Math.max(0.001, TREE_RUNNERS_TRANSITION_ZONE_HALF_WIDTH * 2);
                    transition.progress = clamp01(rawProgress);
                    if (transition.progress >= 1 || zoneDelta >= TREE_RUNNERS_TRANSITION_ZONE_HALF_WIDTH) {
                        transition.done = true;
                        treeRunnerState.slotEntries[i] = transition.incomingEntry;
                        setTreeRunnersVisible(ENABLE_TREE_RUNNERS);
                    }
                }

                if (transition.done) {
                    completedCount += 1;
                }
            }

            if (completedCount >= slotCount) {
                finishTreeRunnerBatchTransition();
            }
        }

        function loadTreeRunnerModel(modelUrl) {
            return new Promise((resolve, reject) => {
                gltfLoader.load(modelUrl, resolve, undefined, reject);
            });
        }

        function normalizeTreeRunnerModelToGround(model) {
            _treeRunnerBox.setFromObject(model);
            _treeRunnerBox.getSize(_treeRunnerSize);
            const height = Math.max(0.001, _treeRunnerSize.y);
            const scale = TREE_RUNNERS_TARGET_HEIGHT / height;
            model.scale.setScalar(scale);

            _treeRunnerBox.setFromObject(model);
            _treeRunnerBox.getCenter(_treeRunnerCenter);
            model.position.x -= _treeRunnerCenter.x;
            model.position.z -= _treeRunnerCenter.z;
            model.position.y -= _treeRunnerBox.min.y;
        }

        /** GLB が無い環境でも軌道演出が動くよう、軽いプロシージャルメッシュを生成する */
        function createProceduralTreeRunnerModel(index) {
            const t = index * 1.6180339887;
            const hue = (0.86 + (t % 1) * 0.11) % 1;
            const color = new THREE.Color().setHSL(hue, 0.5, 0.55);
            const mat = new THREE.MeshStandardMaterial({
                color,
                metalness: 0.2,
                roughness: 0.44,
                emissive: new THREE.Color(color).multiplyScalar(0.06),
            });
            const group = new THREE.Group();
            const core = new THREE.Mesh(new THREE.IcosahedronGeometry(1, 1), mat);
            group.add(core);
            const ring = new THREE.Mesh(
                new THREE.TorusGeometry(0.78, 0.1, 10, 28),
                mat.clone(),
            );
            ring.rotation.x = Math.PI / 2;
            ring.position.y = 0.12;
            group.add(ring);
            const orb = new THREE.Mesh(
                new THREE.OctahedronGeometry(0.35, 0),
                mat.clone(),
            );
            orb.position.y = 1.05;
            group.add(orb);
            return group;
        }

        function makeTreeRunnerEntry(model, modelUrl) {
            const root = new THREE.Group();
            const visual = new THREE.Group();
            root.visible = false;
            root.add(visual);
            visual.add(model);
            treeRunnersRoot.add(root);
            return {
                root,
                visual,
                loaded: true,
                modelUrl,
            };
        }

        function commitTreeRunnerEntries(loadedEntries) {
            treeRunnerState.entries = loadedEntries;
            treeRunnerState.batches = createTreeRunnerBatches(loadedEntries);
            treeRunnerState.activeBatchIndex = 0;
            treeRunnerState.incomingBatchIndex = -1;
            treeRunnerState.completedLaps = 0;
            treeRunnerState.transitionActive = false;
            treeRunnerState.orbitAngle = 0;
            treeRunnerState.orbitTotalAngle = 0;
            treeRunnerState.slotTransitions = [];
            setTreeRunnerBatchSlots(0);
            treeRunnerState.loaded = treeRunnerState.batches.length > 0;
            setTreeRunnersVisible(ENABLE_TREE_RUNNERS);
        }

        function buildProceduralTreeRunnerEntries() {
            const loadedEntries = [];
            const n = Math.min(TREE_RUNNERS_FALLBACK_COUNT, TREE_RUNNERS_MAX_MODELS);
            for (let i = 0; i < n; i++) {
                const model = createProceduralTreeRunnerModel(i);
                normalizeTreeRunnerModelToGround(model);
                loadedEntries.push(makeTreeRunnerEntry(model, `procedural:${i}`));
            }
            return loadedEntries;
        }

        async function loadTreeRunners() {
            treeRunnerState.loading = true;
            treeRunnerState.attempted = true;
            try {
                const payload = STATIC_TREE_RUNNERS_MANIFEST || await (async () => {
                    const response = await fetch(TREE_RUNNERS_MANIFEST_URL, { cache: 'no-store' });
                    if (!response.ok) {
                        throw new Error(`manifest request failed: ${response.status}`);
                    }
                    return response.json();
                })();
                const modelUrls = (Array.isArray(payload?.items) ? payload.items : [])
                    .filter((item) => typeof item === 'string' && /\.glb(?:\?.*)?$/i.test(item))
                    .slice(0, TREE_RUNNERS_MAX_MODELS);

                let loadedEntries = [];

                if (modelUrls.length) {
                    for (let i = 0; i < modelUrls.length; i++) {
                        const modelUrl = modelUrls[i];
                        const gltf = await loadTreeRunnerModel(modelUrl);
                        const model = gltf.scene;
                        model.traverse((obj) => {
                            if (obj.isMesh) {
                                obj.frustumCulled = true;
                            }
                        });
                        normalizeTreeRunnerModelToGround(model);
                        loadedEntries.push(makeTreeRunnerEntry(model, modelUrl));
                    }
                } else {
                    console.info(
                        '[sakurasake-screen] no .glb in manifest; using procedural tree runner models',
                    );
                    loadedEntries = buildProceduralTreeRunnerEntries();
                }

                commitTreeRunnerEntries(loadedEntries);
            } catch (error) {
                console.warn('[sakurasake-screen] tree runners load failed', error);
                try {
                    commitTreeRunnerEntries(buildProceduralTreeRunnerEntries());
                } catch (fallbackError) {
                    console.warn('[sakurasake-screen] procedural tree runners failed', fallbackError);
                    treeRunnerState.entries = [];
                    treeRunnerState.batches = [];
                    treeRunnerState.slotEntries = [];
                    treeRunnerState.slotTransitions = [];
                    treeRunnerState.loaded = false;
                }
            } finally {
                treeRunnerState.loading = false;
            }
        }

        function updateTreeRunnersActivation() {
            if (ENABLE_TREE_RUNNERS && !treeRunnerState.loaded && !treeRunnerState.loading && !treeRunnerState.attempted) {
                void loadTreeRunners();
                return;
            }

            if (treeRunnerState.loaded) {
                setTreeRunnersVisible(ENABLE_TREE_RUNNERS);
            }
        }

        if (ENABLE_TREE_RUNNERS) {
            void loadTreeRunners();
        }

        function updateTreeRunners(elapsedTime, deltaTime) {
            if (!treeRunnerState.loaded) return;

            const tau = Math.PI * 2;
            const prevLapIndex = Math.floor(treeRunnerState.orbitTotalAngle / tau);
            treeRunnerState.orbitTotalAngle += deltaTime * TREE_RUNNERS_ORBIT_SPEED;
            treeRunnerState.orbitAngle = normalizeAngle(treeRunnerState.orbitTotalAngle);
            const nextLapIndex = Math.floor(treeRunnerState.orbitTotalAngle / tau);

            if (nextLapIndex > prevLapIndex) {
                treeRunnerState.completedLaps += 1;
                if (
                    treeRunnerState.completedLaps >= Math.max(1, TREE_RUNNERS_BATCH_LAPS - 1) &&
                    !treeRunnerState.transitionActive
                ) {
                    startTreeRunnerBatchTransition();
                }
            }

            const angleGap = TREE_RUNNERS_FOLLOW_DISTANCE / Math.max(0.001, TREE_RUNNERS_RADIUS);
            updateTreeRunnerBatchTransition(angleGap);

            for (let i = 0; i < treeRunnerState.slotEntries.length; i++) {
                const entry = treeRunnerState.slotEntries[i];
                if (!entry) continue;

                const angle = treeRunnerState.orbitAngle - i * angleGap;
                const transition = treeRunnerState.slotTransitions[i];
                if (transition && !transition.done) {
                    const eased = easeInOut(transition.progress);
                    applyTreeRunnerTransform(entry, angle, elapsedTime, i, {
                        radiusOffset: TREE_RUNNERS_EXIT_RADIUS_OFFSET * eased,
                        rootYOffset: -TREE_RUNNERS_EXIT_DROP * eased,
                        angleOffset: 0.05 * eased,
                        pitchOffset: -0.06 * eased,
                        rollOffset: 0.04 * eased,
                        scaleMul: 1 - eased * 0.08,
                    });
                    applyTreeRunnerTransform(transition.incomingEntry, angle, elapsedTime, i, {
                        radiusOffset: TREE_RUNNERS_ENTRY_RADIUS_OFFSET * (1 - eased),
                        rootYOffset: -TREE_RUNNERS_EXIT_DROP * (1 - eased),
                        angleOffset: -0.08 * (1 - eased),
                        pitchOffset: 0.05 * (1 - eased),
                        rollOffset: -0.04 * (1 - eased),
                        scaleMul: 0.95 + eased * 0.05,
                    });
                    entry.visual.rotation.y += deltaTime * TREE_RUNNERS_SELF_SPIN_SPEED;
                    transition.incomingEntry.visual.rotation.y +=
                        deltaTime * TREE_RUNNERS_SELF_SPIN_SPEED;
                    continue;
                }

                applyTreeRunnerTransform(entry, angle, elapsedTime, i);
                entry.visual.rotation.y += deltaTime * TREE_RUNNERS_SELF_SPIN_SPEED;
            }
        }

        // --- 5. 舞い散る花びら（InstancedMesh） ---
        const ENABLE_FALLING_PETALS = ENABLE_STAGE_AMBIENCE && ENABLE_STAGE_PETALS;
        const particlesMax = 300;
        // CPUで毎フレーム全インスタンスの行列を書き換えると、枚数増加で一気に重くなる。
        // ここでは「初期配置だけCPU」「落下/揺れはGPU(シェーダ)で時間から計算」にして、
        // スライダーで枚数を増やしてもCPU負荷が増えにくい構造にする。
        const fallingPetals = new THREE.InstancedMesh(petalGeometry, petalMaterial.clone(), particlesMax);
        // 追加パラメータ（インスタンス属性）
        const aSpeedY = new Float32Array(particlesMax);
        const aPhaseX = new Float32Array(particlesMax);
        const aPhaseZ = new Float32Array(particlesMax);
        const aAmp = new Float32Array(particlesMax);
        const aStartY = new Float32Array(particlesMax);
        const aRange = new Float32Array(particlesMax);
        const aDrift = new Float32Array(particlesMax);

        // 時間ユニフォーム（GPUで落下量を算出）
        const petalUniforms = { uTime: { value: 0 } };
        const dummy = new THREE.Object3D();
        for (let i = 0; i < particlesMax; i++) {
            const x = (petalRng() - 0.5) * 40;
            const y = petalRng() * 30 - 5;
            const z = (petalRng() - 0.5) * 40;

            dummy.position.set(x, y, z);
            dummy.rotation.set(petalRng() * Math.PI, petalRng() * Math.PI, petalRng() * Math.PI);
            const scale = 0.4 + petalRng() * 0.4;
            dummy.scale.set(scale, scale, scale);
            dummy.updateMatrix();
            fallingPetals.setMatrixAt(i, dummy.matrix);

            // 各インスタンスの落下・揺れパラメータ
            aSpeedY[i] = petalRng() * 0.55 + 0.35;        // 落下スピード（単位/秒、シェーダ側で使用）
            aPhaseX[i] = petalRng() * Math.PI * 2;        // 揺れ位相
            aPhaseZ[i] = petalRng() * Math.PI * 2;
            aAmp[i] = petalRng() * 0.12 + 0.04;           // 揺れ振幅
            aStartY[i] = y;                                  // 初期Y
            aRange[i] = petalRng() * 34 + 18;             // ループ範囲
            aDrift[i] = (petalRng() - 0.5) * 0.35;        // 横流れ
        }
        // InstancedBufferAttributes を追加
        fallingPetals.geometry.setAttribute('aSpeedY', new THREE.InstancedBufferAttribute(aSpeedY, 1));
        fallingPetals.geometry.setAttribute('aPhaseX', new THREE.InstancedBufferAttribute(aPhaseX, 1));
        fallingPetals.geometry.setAttribute('aPhaseZ', new THREE.InstancedBufferAttribute(aPhaseZ, 1));
        fallingPetals.geometry.setAttribute('aAmp', new THREE.InstancedBufferAttribute(aAmp, 1));
        fallingPetals.geometry.setAttribute('aStartY', new THREE.InstancedBufferAttribute(aStartY, 1));
        fallingPetals.geometry.setAttribute('aRange', new THREE.InstancedBufferAttribute(aRange, 1));
        fallingPetals.geometry.setAttribute('aDrift', new THREE.InstancedBufferAttribute(aDrift, 1));

        // マテリアルの頂点シェーダを拡張（時間でオフセット）
        // 透明/両面などの既存設定を保ちつつ、インスタンス単位で位置を動かす。
        fallingPetals.material.onBeforeCompile = (shader) => {
            shader.uniforms.uTime = petalUniforms.uTime;
            shader.vertexShader =
                `
                uniform float uTime;
                attribute float aSpeedY;
                attribute float aPhaseX;
                attribute float aPhaseZ;
                attribute float aAmp;
                attribute float aStartY;
                attribute float aRange;
                attribute float aDrift;
                ` + shader.vertexShader;

            shader.vertexShader = shader.vertexShader.replace(
                '#include <begin_vertex>',
                `
                #include <begin_vertex>
                // インスタンス基準位置（instanceMatrixの平行移動成分）
                vec3 iPos = vec3(instanceMatrix[3][0], instanceMatrix[3][1], instanceMatrix[3][2]);
                // 落下: startY から range を周期的にループ
                float fall = mod(uTime * aSpeedY + aPhaseX, aRange);
                float yNow = aStartY - fall;
                // 揺れ: sin/cos（GPU側で一括処理）
                float swayX = sin(uTime * 1.7 + aPhaseX) * aAmp;
                float swayZ = cos(uTime * 1.3 + aPhaseZ) * aAmp;
                // 横流れ: 落下量に比例したドリフト
                float drift = (fall / max(aRange, 0.001)) * aDrift;
                transformed.x += swayX + drift;
                transformed.z += swayZ;
                // instanceMatrix のY(=iPos.y) + (yNow - aStartY) を適用
                transformed.y += (yNow - aStartY);
                `
            );
        };
        // Three がコンパイルしたシェーダを使い回せるように
        fallingPetals.material.needsUpdate = true;

        fallingPetals.count = 0;
        fallingPetals.visible = ENABLE_FALLING_PETALS;
        scene.add(fallingPetals);

        function setWeatherStyleVar(name, value) {
            document.body.style.setProperty(name, value);
        }

        function applyWeatherBackdrop(percent01) {
            const p = clamp01(percent01);
            const weather = sampleWeatherBackdrop(p);
            const rain = ENABLE_STAGE_AMBIENCE && ENABLE_STAGE_WEATHER && ENABLE_STAGE_RAIN
                ? weather.rain
                : 0;
            const sun = ENABLE_STAGE_AMBIENCE && ENABLE_STAGE_WEATHER && ENABLE_STAGE_SUN
                ? Math.pow(p, 1.45)
                : 0;
            const sunshineProgress = Math.max(0, (p - 0.42) / 0.58);
            const sunbeams = ENABLE_STAGE_AMBIENCE && ENABLE_STAGE_WEATHER && ENABLE_STAGE_SUN
                ? Math.pow(sunshineProgress, 1.15)
                : 0;
            const cloudOpacity = ENABLE_STAGE_AMBIENCE && ENABLE_STAGE_WEATHER
                ? weather.cloudOpacity
                : 0;
            const brightness = ENABLE_STAGE_AMBIENCE && ENABLE_STAGE_WEATHER
                ? weather.brightness
                : 1;
            const saturate = ENABLE_STAGE_AMBIENCE && ENABLE_STAGE_WEATHER
                ? weather.saturate
                : 1;
            weatherRainIntensity = rain;

            setWeatherStyleVar('--weather-sky-top', weather.top);
            setWeatherStyleVar('--weather-sky-mid', weather.mid);
            setWeatherStyleVar('--weather-sky-bottom', weather.bottom);
            setWeatherStyleVar('--weather-sky-haze', weather.haze);
            setWeatherStyleVar('--weather-sky-glow', weather.glow);
            setWeatherStyleVar('--weather-rain-opacity', rain.toFixed(3));
            setWeatherStyleVar('--weather-cloud-opacity', cloudOpacity.toFixed(3));
            setWeatherStyleVar('--weather-sun-opacity', (sun * 0.86).toFixed(3));
            setWeatherStyleVar('--weather-sunbeams-opacity', (sunbeams * 0.58).toFixed(3));
            setWeatherStyleVar('--weather-backdrop-brightness', brightness.toFixed(3));
            setWeatherStyleVar('--weather-backdrop-saturate', saturate.toFixed(3));
        }

        function applyBlossomAmbience(percent01) {
            const p = clamp01(percent01);
            const stage = ENABLE_STAGE_AMBIENCE ? resolveAmbienceStage(p) : 0;

            document.body.dataset.ambienceStage = String(stage);
            applyWeatherBackdrop(p);

            if (ENABLE_STAGE_AMBIENCE && ENABLE_STAGE_LIGHTING) {
                const ambience = sampleAmbiencePreset(p);
                ambientLight.color.copy(ambience.ambientColor);
                ambientLight.intensity = ambience.ambientIntensity;
                sunLight.color.copy(ambience.sunColor);
                sunLight.intensity = ambience.sunIntensity;
                scene.fog.color.copy(ambience.fogColor);
                scene.fog.density = ambience.fogDensity;
            }

            if (ENABLE_STAGE_AMBIENCE && ENABLE_FALLING_PETALS) {
                const ambience = sampleAmbiencePreset(p);
                const visible = ambience.petalCount > 0;
                fallingPetals.visible = visible;
                fallingPetals.count = visible ? Math.min(particlesMax, ambience.petalCount) : 0;
            } else if (ENABLE_FALLING_PETALS) {
                fallingPetals.visible = false;
                fallingPetals.count = 0;
            }
        }

        // --- 6. 木の装飾花（累計post+commentで段階表示。80で満開） ---
        function applyTreeFlowerByBlossomPercent(percent01) {
            const p = clamp01(percent01);
            const isFull = p >= 1;
            const effectiveFlowerDensity = isFull ? 1 : FLOWER_DENSITY * p;
            const treeFlowerSizeMul =
                1 + (1 / Math.sqrt(Math.max(0.12, effectiveFlowerDensity)) - 1) * 0.55;
            const visibleDecor = isFull
                ? flowerMeshes.length
                : Math.round(flowerMeshes.length * FLOWER_DENSITY * p);

            for (let i = 0; i < flowerMeshes.length; i++) {
                const fg = flowerMeshes[i];
                const isVisible = i < visibleDecor;
                fg.visible = isVisible;
                const baseScale = Number(fg.userData?.baseScale) || 1;
                const s = baseScale * (isVisible ? treeFlowerSizeMul : 1);
                fg.scale.set(s, s, s);
            }
        }

        function setBlossomTotalCount(nextCount) {
            const n = Math.max(0, Math.trunc(Number(nextCount) || 0));
            blossomTotalCount = n;
            const percent = blossomPercentFromTotalCount(blossomTotalCount);
            applyTreeFlowerByBlossomPercent(percent);
            applyBlossomAmbience(percent);
            updateTreeRunnersActivation();

        // --- 6b. 軌道コンテンツ（ミニトーストが XZ 上の真円を周回。投稿は PointLight でいいね発光）
        // 検証トグル（すぐ戻せる）
        // - "dom": 既存（CSS2DRenderer + DOMカード）
        // - "webgl": 本物の3D（CanvasTexture を貼ったプレーン）
        const ORBIT_RENDER_MODE = 'webgl';
        // すぐ戻せる: カード高さを内容に応じて動的化（空欄を減らす）
        const ORBIT_CARD_DYNAMIC_HEIGHT = true;
        const ORBIT_CARD_IMG_MAX_HEIGHT_PX = 360;
        const ORBIT_CARD_MIN_HEIGHT_PX = 360;

        // すぐ戻せる: 「木の裏側で暗くなる」強さ（0に近いほど明るい）
        const ORBIT_BEHIND_DIM_STRENGTH = 0.55;
        // すぐ戻せる: カード向きを「木→カメラの共通yaw」に揃える
        const ORBIT_USE_TREE_CAMERA_YAW = true;
        const ORBIT_USE_GOLDEN_SPREAD = true; // true=黄金角スパイラル, false=従来リング
        const ORBIT_ENABLE_LOD = true; // true=遠距離カードの更新を間引く
        const ORBIT_FAR_UPDATE_EVERY_N_FRAMES = 3;

        const ORBIT_FAR_DISTANCE_SQ = ORBIT_FAR_DISTANCE * ORBIT_FAR_DISTANCE;
        const ORBIT_ENABLE_POST_POINT_LIGHTS = false;
        const ORBIT_HIDE_TEXT_WHEN_BEHIND = true;
        const ORBIT_HIDE_TEXT_BEHIND_START = 0.08;
        const ORBIT_HIDE_TEXT_BEHIND_END = 0.04;
        // 画面内での「ばらし」調整（すぐ戻せる）
        // - 横: 画面中心から左右に 1.5倍 くらい広げる
        // - 縦: 画面下端（底）を基準に上方向へ 2.5倍 くらい伸ばす
        const ORBIT_SPREAD_XZ_SCALE = 1.5;

        const ORBIT_ITEMS_PER_RING = 6;

        const orbitRoot = new THREE.Group();

        const ORBIT_ROOT_Y = -2.4;
        orbitRoot.position.set(0, ORBIT_ROOT_Y, 0);

        const labelRenderer = ORBIT_RENDER_MODE === 'dom'
            ? new CSS2DRenderer()
