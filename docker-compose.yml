services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sakurasake
      POSTGRES_PASSWORD: sakurasake
      POSTGRES_DB: sakurasake
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sakurasake -d sakurasake"]
      interval: 2s
      timeout: 5s
      retries: 20

  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./out:/app/out
    environment:
      DATABASE_URL: postgres://sakurasake:sakurasake@db:5432/sakurasake
      PORT: "8080"
      RACK_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
